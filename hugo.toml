######################## default configuration ####################
baseURL = "https://www.calxo.in/"
canonifyURLs = true
relativeURLs = false

title = "Calxo - Free Online Calculators for India"
theme = "gojournal-hugo"
timeZone = "Asia/Kolkata"
pagination.pagerSize = 12
summaryLength = 20
disableLanguages = ["fr"]
hasCJKLanguage = false

############################# Build ##############################
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'

########################### Services #############################
[services]
[services.googleAnalytics]
ID = ''  # add Calxo GA4 ID here when ready

############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS", "SITEMAP", "JSON"]

############################# Imaging ##############################
[imaging]
quality = 100
resampleFilter = "lanczos"

############################# Caches ###############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

############################# Markup ###############################
[markup]
[markup.goldmark.renderer]
unsafe = true

############################# Plugins ##############################

# CSS Plugins. Bootstrap loaded via CDN in head.html (deferred); themify-icons kept for footer.
[[params.plugins.css]]
link = "plugins/themify-icons/themify-icons.css"

# JS Plugins
[[params.plugins.js]]
link = "plugins/jQuery/jquery.min.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
[[params.plugins.js]]
link = "plugins/slick/slick.min.js"
[[params.plugins.js]]
link = "plugins/search/fuse.min.js"
[[params.plugins.js]]
link = "plugins/search/mark.js"
[[params.plugins.js]]
link = "plugins/search/search.js"

