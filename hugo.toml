#################### default parameters ################################
[params]
logo = "images/logo.svg"
description = "Free online calculators for Indian users: EMI, SIP, GST, income tax, FD, PPF, salary, conversions and more. Fast, accurate, no sign-up."
author = "Calxo Team"
contact_form_action = "#"
google_analitycs_id = "G-11QNFDC0CH"
sidebar = "right"

# Preloader
[params.preloader]
enable = false
preloader = ""

# Subscription
[params.subscription]
enable = false
mailchimp_form_action = ""
mailchimp_form_name = ""

# Promotion
[params.promotion]
enable = false
image = ""
link = "#"

# Instagram feed - disabled
[params.instafeed]
enable = false
user_id = ""
access_token = ""

############################# social site ########################
[[params.social]]
title = "twitter"
icon = "ti-twitter-alt"
link = "#"

[[params.social]]
title = "linkedin"
icon = "ti-linkedin"
link = "#"

################################### English language #####################################
[Languages.en]
languageName = "En"
languageCode = "en-in"
contentDir = "content/english"
weight = 1

[Languages.en.params]
home = "Home"
subscription_title = "Stay updated on new calculators"
subscription_content = "We'll email you when we ship new tools."
copyright = "Copyright &copy; 2026 | All rights reserved by [Calxo](https://www.calxo.in)"

[taxonomies]
   category = "categories"

[mediaTypes."text/plain"]
suffixes = ["txt"]

[outputFormats.RobotsTXT]
mediaType = "text/plain"
baseName = "robots"
isPlainText = true
notAlternative = true
