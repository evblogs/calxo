name: Daily Content Generator

on:
  schedule:
    # 4:00 AM UTC = 9:30 AM IST — 1 hour after EVBlogs runs
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      posts_per_run:
        description: 'Number of posts to generate (default: 2)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai google-auth google-auth-httplib2 requests

      - name: Write GSC key file
        run: echo '${{ secrets.GSC_KEY_JSON }}' > $GITHUB_WORKSPACE/pythonfiles/gsc-key.json

      - name: Configure git
        run: |
          git config user.name  "Calxo Content Bot"
          git config user.email "avmedianews321@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/evblogs/calxo.git

      - name: Generate and publish content
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          GSC_CREDENTIALS_PATH: ${{ github.workspace }}/pythonfiles/gsc-key.json
          POSTS_PER_RUN:        ${{ github.event.inputs.posts_per_run || '2' }}
        run: python pythonfiles/calxo_daily_content.py

      - name: Commit queue tracking file
        run: |
          git add pythonfiles/calxo_content_queue.json || true
          git diff --cached --quiet || git commit -m "chore: update content queue [skip ci]"
          git pull --rebase origin master || true
          git push origin master || true
