<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="metroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="metroFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#metroBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">Metro vs non-metro for HRA — narrower than people think</text>
  <text x="400" y="66" font-size="13" fill="#64748b" text-anchor="middle">Income Tax Rules define only 4 metros. Bengaluru, Hyderabad, Pune are non-metro for HRA.</text>

  <!-- Metro side -->
  <g transform="translate(60,110)">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="url(#metroFill)"/>
    <text x="160" y="38" font-size="48" font-weight="800" fill="#fff" text-anchor="middle">50%</text>
    <text x="160" y="66" font-size="13" fill="#fff" text-anchor="middle" opacity=".85">of basic salary as exemption ceiling</text>
    <text x="160" y="100" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" opacity=".75" text-transform="uppercase" letter-spacing="1.5">METRO CITIES (4 ONLY)</text>
    <line x1="40" y1="115" x2="280" y2="115" stroke="#fff" stroke-opacity=".25"/>
    <text x="160" y="142" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Delhi · Mumbai</text>
    <text x="160" y="166" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Chennai · Kolkata</text>
    <text x="160" y="200" font-size="11" fill="#fff" text-anchor="middle" opacity=".7">Section 10(13A), Rule 2A</text>
  </g>

  <!-- Non-metro side -->
  <g transform="translate(420,110)">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="160" y="38" font-size="48" font-weight="800" fill="#475569" text-anchor="middle">40%</text>
    <text x="160" y="66" font-size="13" fill="#475569" text-anchor="middle">of basic salary as exemption ceiling</text>
    <text x="160" y="100" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle" text-transform="uppercase" letter-spacing="1.5">EVERYWHERE ELSE</text>
    <line x1="40" y1="115" x2="280" y2="115" stroke="#cbd5e1"/>
    <text x="160" y="140" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Bengaluru · Hyderabad · Pune</text>
    <text x="160" y="160" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Gurgaon · Noida · Ahmedabad</text>
    <text x="160" y="180" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Tier-2 + Tier-3 cities</text>
    <text x="160" y="208" font-size="11" fill="#94a3b8" text-anchor="middle">Same rule, lower percentage</text>
  </g>

  <text x="400" y="360" font-size="11" fill="#94a3b8" text-anchor="middle">Source: Income Tax Rules, 1962 — Rule 2A · Calxo HRA calculator</text>
</svg>
