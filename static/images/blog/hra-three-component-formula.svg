<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="hraBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="hraWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#hraBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">HRA exemption = MINIMUM of three components</text>
  <text x="400" y="66" font-size="13" fill="#64748b" text-anchor="middle">Section 10(13A) read with Rule 2A. Picking the lowest of three numbers.</text>

  <!-- 3 component cards -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="200" height="160" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <circle cx="100" cy="36" r="22" fill="#eff6ff"/>
    <text x="100" y="44" font-size="20" font-weight="800" fill="#1d4ed8" text-anchor="middle">①</text>
    <text x="100" y="84" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Actual HRA</text>
    <text x="100" y="100" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">received</text>
    <text x="100" y="124" font-size="11" fill="#64748b" text-anchor="middle">From Form 16 / payslip</text>
    <text x="100" y="142" font-size="11" fill="#64748b" text-anchor="middle">(annual)</text>
  </g>

  <g transform="translate(300,120)">
    <rect x="0" y="0" width="200" height="160" rx="14" fill="url(#hraWin)" stroke="#2563eb"/>
    <circle cx="100" cy="36" r="22" fill="#fff" opacity=".95"/>
    <text x="100" y="44" font-size="20" font-weight="800" fill="#1d4ed8" text-anchor="middle">②</text>
    <text x="100" y="84" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">50% / 40% of</text>
    <text x="100" y="100" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">(Basic + DA)</text>
    <text x="100" y="124" font-size="11" fill="#fff" text-anchor="middle" opacity=".9">50% in Delhi/Mumbai/</text>
    <text x="100" y="140" font-size="11" fill="#fff" text-anchor="middle" opacity=".9">Chennai/Kolkata · 40% rest</text>
  </g>

  <g transform="translate(540,120)">
    <rect x="0" y="0" width="200" height="160" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <circle cx="100" cy="36" r="22" fill="#eff6ff"/>
    <text x="100" y="44" font-size="20" font-weight="800" fill="#1d4ed8" text-anchor="middle">③</text>
    <text x="100" y="84" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Rent paid</text>
    <text x="100" y="100" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">− 10% of basic</text>
    <text x="100" y="124" font-size="11" fill="#64748b" text-anchor="middle">Most renters in metros</text>
    <text x="100" y="142" font-size="11" fill="#64748b" text-anchor="middle">are bottlenecked here</text>
  </g>

  <!-- Arrows down -->
  <path d="M 160 290 L 160 310 L 400 310 L 400 330" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M 400 290 L 400 330" fill="none" stroke="#2563eb" stroke-width="2"/>
  <path d="M 640 290 L 640 310 L 400 310 L 400 330" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Bottom result -->
  <g transform="translate(220,335)">
    <rect x="0" y="0" width="360" height="56" rx="10" fill="#0f172a"/>
    <text x="180" y="26" font-size="13" fill="#fff" text-anchor="middle" opacity=".75" text-transform="uppercase" letter-spacing="1.5">EXEMPT FROM TAX</text>
    <text x="180" y="46" font-size="14" font-weight="700" fill="#06b6d4" text-anchor="middle">min(①, ②, ③)</text>
  </g>
</svg>
