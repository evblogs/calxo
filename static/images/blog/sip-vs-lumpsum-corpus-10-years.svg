<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="sipBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="lumpG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="sipG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#sipBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">Same ₹6 lakh, 10 years, 12% CAGR</text>
  <text x="400" y="68" font-size="14" fill="#64748b" text-anchor="middle">Lumpsum stays invested longer — that's where the ₹7 lakh gap comes from</text>

  <!-- Lumpsum bar -->
  <g transform="translate(170,130)">
    <text x="100" y="0" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle" text-transform="uppercase" letter-spacing="1">LUMPSUM</text>
    <rect x="20" y="20" width="160" height="220" fill="url(#lumpG)" rx="10"/>
    <text x="100" y="130" font-size="32" font-weight="800" fill="#fff" text-anchor="middle">₹18.6L</text>
    <text x="100" y="158" font-size="12" fill="#fff" text-anchor="middle" opacity=".85">future value</text>
    <line x1="20" y1="186" x2="180" y2="186" stroke="#fff" stroke-opacity=".25" stroke-width="1"/>
    <text x="100" y="208" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">Invested ₹6L on day 1</text>
    <text x="100" y="226" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">All 10 yrs compounding</text>
  </g>

  <!-- SIP bar -->
  <g transform="translate(450,130)">
    <text x="100" y="0" font-size="13" font-weight="700" fill="#475569" text-anchor="middle" text-transform="uppercase" letter-spacing="1">SIP</text>
    <rect x="20" y="80" width="160" height="160" fill="url(#sipG)" rx="10"/>
    <text x="100" y="170" font-size="32" font-weight="800" fill="#fff" text-anchor="middle">₹11.6L</text>
    <text x="100" y="195" font-size="12" fill="#fff" text-anchor="middle" opacity=".85">future value</text>
    <line x1="20" y1="210" x2="180" y2="210" stroke="#fff" stroke-opacity=".25" stroke-width="1"/>
    <text x="100" y="226" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">₹5,000/month × 120</text>
  </g>

  <!-- Gap callout -->
  <path d="M 350 250 Q 400 270 450 250" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="335" y="290" width="130" height="40" rx="8" fill="#06b6d4"/>
  <text x="400" y="316" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">₹7L gap</text>

  <!-- Source note -->
  <text x="400" y="410" font-size="11" fill="#94a3b8" text-anchor="middle">12% CAGR assumption · 10-year horizon · Calxo SIP &amp; Lumpsum calculators</text>
</svg>
