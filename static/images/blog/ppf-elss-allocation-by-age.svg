<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="ageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="elssC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ppfC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#ageBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">PPF vs ELSS allocation by age band</text>
  <text x="400" y="66" font-size="13" fill="#64748b" text-anchor="middle">Equity tilt early, debt anchor as you approach retirement</text>

  <!-- Three age bands as stacked horizontal bars -->
  <g transform="translate(120,110)">
    <!-- Age 25-35 -->
    <text x="0" y="14" font-size="13" font-weight="700" fill="#0f172a">Age 25–35</text>
    <text x="0" y="32" font-size="11" fill="#64748b">Equity-tolerant, long horizon</text>
    <rect x="170" y="0" width="380" height="36" rx="6" fill="#e2e8f0"/>
    <rect x="170" y="0" width="285" height="36" rx="6" fill="url(#elssC)"/>
    <text x="312" y="23" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">75% ELSS</text>
    <text x="503" y="23" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">25% PPF</text>

    <!-- Age 35-50 -->
    <text x="0" y="84" font-size="13" font-weight="700" fill="#0f172a">Age 35–50</text>
    <text x="0" y="102" font-size="11" fill="#64748b">Balanced, mid-career</text>
    <rect x="170" y="70" width="380" height="36" rx="6" fill="#e2e8f0"/>
    <rect x="170" y="70" width="190" height="36" rx="6" fill="url(#elssC)"/>
    <text x="265" y="93" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">50% ELSS</text>
    <text x="455" y="93" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">50% PPF</text>

    <!-- Age 50+ -->
    <text x="0" y="154" font-size="13" font-weight="700" fill="#0f172a">Age 50+</text>
    <text x="0" y="172" font-size="11" fill="#64748b">Conservative, near retirement</text>
    <rect x="170" y="140" width="380" height="36" rx="6" fill="#e2e8f0"/>
    <rect x="170" y="140" width="95" height="36" rx="6" fill="url(#elssC)"/>
    <rect x="265" y="140" width="285" height="36" rx="6" fill="url(#ppfC)"/>
    <text x="217" y="163" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">25% ELSS</text>
    <text x="407" y="163" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">75% PPF</text>
  </g>

  <!-- Legend -->
  <g transform="translate(120,330)">
    <rect x="0" y="0" width="14" height="14" fill="url(#elssC)" rx="2"/>
    <text x="22" y="12" font-size="12" fill="#0f172a">ELSS (equity, 12-14% expected CAGR)</text>
    <rect x="280" y="0" width="14" height="14" fill="url(#ppfC)" rx="2"/>
    <text x="302" y="12" font-size="12" fill="#0f172a">PPF (debt anchor, 7.1% guaranteed)</text>
  </g>
</svg>
