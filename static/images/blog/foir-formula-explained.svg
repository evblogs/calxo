<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="foirBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="foirAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#foirBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">FOIR formula every Indian bank uses</text>
  <text x="400" y="66" font-size="13" fill="#64748b" text-anchor="middle">Most banks cap your total EMI burden at 50% of net monthly income</text>

  <!-- 3 boxes in a row -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#fff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="100" y="32" font-size="11" font-weight="700" fill="#475569" text-anchor="middle" text-transform="uppercase" letter-spacing="1">STEP 1</text>
    <text x="100" y="65" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">₹75,000</text>
    <text x="100" y="86" font-size="12" fill="#64748b" text-anchor="middle">Net monthly income</text>
    <text x="100" y="105" font-size="11" fill="#94a3b8" text-anchor="middle">(take-home)</text>
  </g>

  <text x="282" y="180" font-size="22" font-weight="800" fill="#2563eb" text-anchor="middle">×</text>

  <g transform="translate(300,120)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#foirAcc)"/>
    <text x="100" y="32" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" text-transform="uppercase" letter-spacing="1" opacity=".85">STEP 2</text>
    <text x="100" y="68" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">50%</text>
    <text x="100" y="92" font-size="12" fill="#fff" text-anchor="middle" opacity=".9">FOIR cap</text>
    <text x="100" y="108" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">SBI, HDFC, ICICI standard</text>
  </g>

  <text x="522" y="180" font-size="22" font-weight="800" fill="#2563eb" text-anchor="middle">=</text>

  <g transform="translate(540,120)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <text x="100" y="32" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle" text-transform="uppercase" letter-spacing="1">RESULT</text>
    <text x="100" y="65" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">₹37,500</text>
    <text x="100" y="86" font-size="12" fill="#64748b" text-anchor="middle">Total monthly EMI cap</text>
    <text x="100" y="105" font-size="11" fill="#94a3b8" text-anchor="middle">(across all loans)</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60,280)">
    <rect x="0" y="0" width="680" height="60" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="20" y="24" font-size="13" font-weight="700" fill="#1d4ed8">Eligible new loan EMI =</text>
    <text x="170" y="24" font-size="13" fill="#0f172a">EMI cap − existing EMIs (car / personal / credit card minimum)</text>
    <text x="20" y="46" font-size="11" fill="#64748b">If you carry a ₹5,000 car loan EMI, eligible home loan EMI drops from ₹37,500 to ₹32,500. About ₹16 lakh less loan capacity.</text>
  </g>
</svg>
