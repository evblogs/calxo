<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="bgG2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="oldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="newB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#bgG2)" rx="12"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#0f172a">Old vs New Regime — Tax at ₹15 lakh CTC (Salaried)</text>
  <text x="40" y="66" font-size="13" fill="#64748b">Cross-over moves to ~₹4.75 lakh of deductions. Below that, new regime wins by default.</text>

  <!-- Y axis -->
  <line x1="120" y1="110" x2="120" y2="350" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="350" x2="760" y2="350" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="115" y="115" font-size="10" fill="#94a3b8" text-anchor="end">₹3L</text>
  <text x="115" y="175" font-size="10" fill="#94a3b8" text-anchor="end">₹2.5L</text>
  <text x="115" y="235" font-size="10" fill="#94a3b8" text-anchor="end">₹2L</text>
  <text x="115" y="295" font-size="10" fill="#94a3b8" text-anchor="end">₹1L</text>
  <text x="115" y="354" font-size="10" fill="#94a3b8" text-anchor="end">0</text>

  <!-- Bars: ₹0 / ₹1.5L / ₹2.5L / ₹3.75L / ₹4.5L / ₹5.5L deductions -->
  <!-- Each old bar is normalised: pixel = tax / 3000 (so ₹3L = 240px tall, top y = 110) -->
  <g>
    <!-- 0 ded: old 2.55L → 196 / new 0.975L → 78 -->
    <rect x="148" y="146" width="42" height="204" fill="url(#oldB)" rx="3"/>
    <rect x="194" y="272" width="42" height="78" fill="url(#newB)" rx="3"/>
    <text x="190" y="372" font-size="11" fill="#475569" text-anchor="middle">No deduction</text>

    <!-- 1.5L ded -->
    <rect x="248" y="181" width="42" height="169" fill="url(#oldB)" rx="3"/>
    <rect x="294" y="272" width="42" height="78" fill="url(#newB)" rx="3"/>
    <text x="290" y="372" font-size="11" fill="#475569" text-anchor="middle">₹1.5L (80C)</text>

    <!-- 3.75L ded -->
    <rect x="348" y="237" width="42" height="113" fill="url(#oldB)" rx="3"/>
    <rect x="394" y="272" width="42" height="78" fill="url(#newB)" rx="3"/>
    <text x="390" y="372" font-size="11" fill="#475569" text-anchor="middle">₹3.75L</text>

    <!-- 4.5L ded -->
    <rect x="448" y="256" width="42" height="94" fill="url(#oldB)" rx="3"/>
    <rect x="494" y="272" width="42" height="78" fill="url(#newB)" rx="3"/>
    <text x="490" y="372" font-size="11" fill="#475569" text-anchor="middle">₹4.5L</text>

    <!-- 5.5L ded → old wins -->
    <rect x="548" y="281" width="42" height="69" fill="#10b981" rx="3"/>
    <rect x="594" y="272" width="42" height="78" fill="url(#newB)" rx="3"/>
    <text x="590" y="372" font-size="11" fill="#475569" text-anchor="middle">₹5.5L (max)</text>

    <!-- Cross-over arrow -->
    <line x1="540" y1="120" x2="540" y2="350" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="540" y="105" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle">Cross-over ~₹4.75L</text>
  </g>

  <!-- Legend -->
  <g transform="translate(640,110)">
    <rect x="0" y="0" width="14" height="14" fill="url(#oldB)" rx="2"/>
    <text x="22" y="12" font-size="12" fill="#0f172a">Old regime tax</text>
    <rect x="0" y="22" width="14" height="14" fill="url(#newB)" rx="2"/>
    <text x="22" y="34" font-size="12" fill="#0f172a">New regime tax</text>
    <rect x="0" y="44" width="14" height="14" fill="#10b981" rx="2"/>
    <text x="22" y="56" font-size="12" fill="#0f172a">Old wins</text>
  </g>

  <text x="400" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">All numbers in INR · Salaried at ₹15L CTC · Calxo income tax calculator</text>
</svg>
