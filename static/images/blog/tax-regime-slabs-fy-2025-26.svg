<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="newG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="oldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#bgG)" rx="12"/>
  <text x="40" y="50" font-size="22" font-weight="800" fill="#0f172a">Income Tax Slabs — FY 2025-26 (AY 2026-27)</text>
  <text x="40" y="74" font-size="13" fill="#64748b">After Budget 2025: salaried up to ₹12.75L gross income pays zero tax</text>

  <!-- Old regime column -->
  <g transform="translate(60,110)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#475569" text-transform="uppercase" letter-spacing="1">OLD REGIME</text>
    <rect x="0" y="20" width="280" height="50" rx="6" fill="url(#oldG)" opacity=".25"/>
    <text x="14" y="42" font-size="13" fill="#0f172a">Up to ₹2.5L</text><text x="266" y="42" font-size="13" fill="#475569" text-anchor="end" font-weight="700">Nil</text>
    <rect x="0" y="78" width="280" height="50" rx="6" fill="url(#oldG)" opacity=".4"/>
    <text x="14" y="100" font-size="13" fill="#0f172a">₹2.5L – ₹5L</text><text x="266" y="100" font-size="13" fill="#475569" text-anchor="end" font-weight="700">5%</text>
    <rect x="0" y="136" width="280" height="50" rx="6" fill="url(#oldG)" opacity=".6"/>
    <text x="14" y="158" font-size="13" fill="#0f172a">₹5L – ₹10L</text><text x="266" y="158" font-size="13" fill="#fff" text-anchor="end" font-weight="700">20%</text>
    <rect x="0" y="194" width="280" height="50" rx="6" fill="url(#oldG)"/>
    <text x="14" y="216" font-size="13" fill="#fff">Above ₹10L</text><text x="266" y="216" font-size="13" fill="#fff" text-anchor="end" font-weight="700">30%</text>
    <text x="0" y="278" font-size="11" fill="#94a3b8">87A rebate: ₹12,500 up to ₹5L taxable</text>
  </g>

  <!-- New regime column -->
  <g transform="translate(460,110)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#1d4ed8" text-transform="uppercase" letter-spacing="1">NEW REGIME (DEFAULT)</text>
    <rect x="0" y="20" width="280" height="33" rx="6" fill="url(#newG)" opacity=".15"/>
    <text x="14" y="42" font-size="12" fill="#0f172a">Up to ₹4L</text><text x="266" y="42" font-size="12" fill="#475569" text-anchor="end" font-weight="700">Nil</text>
    <rect x="0" y="61" width="280" height="33" rx="6" fill="url(#newG)" opacity=".25"/>
    <text x="14" y="83" font-size="12" fill="#0f172a">₹4L – ₹8L</text><text x="266" y="83" font-size="12" fill="#475569" text-anchor="end" font-weight="700">5%</text>
    <rect x="0" y="102" width="280" height="33" rx="6" fill="url(#newG)" opacity=".4"/>
    <text x="14" y="124" font-size="12" fill="#0f172a">₹8L – ₹12L</text><text x="266" y="124" font-size="12" fill="#fff" text-anchor="end" font-weight="700">10%</text>
    <rect x="0" y="143" width="280" height="33" rx="6" fill="url(#newG)" opacity=".55"/>
    <text x="14" y="165" font-size="12" fill="#fff">₹12L – ₹16L</text><text x="266" y="165" font-size="12" fill="#fff" text-anchor="end" font-weight="700">15%</text>
    <rect x="0" y="184" width="280" height="33" rx="6" fill="url(#newG)" opacity=".7"/>
    <text x="14" y="206" font-size="12" fill="#fff">₹16L – ₹20L</text><text x="266" y="206" font-size="12" fill="#fff" text-anchor="end" font-weight="700">20%</text>
    <rect x="0" y="225" width="280" height="33" rx="6" fill="url(#newG)" opacity=".85"/>
    <text x="14" y="247" font-size="12" fill="#fff">₹20L – ₹24L</text><text x="266" y="247" font-size="12" fill="#fff" text-anchor="end" font-weight="700">25%</text>
    <rect x="0" y="266" width="280" height="33" rx="6" fill="url(#newG)"/>
    <text x="14" y="288" font-size="12" fill="#fff">Above ₹24L</text><text x="266" y="288" font-size="12" fill="#fff" text-anchor="end" font-weight="700">30%</text>
    <text x="0" y="320" font-size="11" font-weight="700" fill="#1d4ed8">87A rebate: ₹60,000 up to ₹12L taxable</text>
  </g>

  <text x="400" y="440" font-size="11" fill="#94a3b8" text-anchor="middle">Source: Finance Act 2025 · CBDT FY 2025-26 notification · Calxo</text>
</svg>
