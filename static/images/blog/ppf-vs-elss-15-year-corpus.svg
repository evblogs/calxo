<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Plus Jakarta Sans, sans-serif">
  <defs>
    <linearGradient id="ppfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="ppfBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="elssPre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="elssPost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#ppfBg)" rx="12"/>
  <text x="400" y="44" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">PPF vs ELSS — ₹1.5L per year for 15 years</text>
  <text x="400" y="66" font-size="13" fill="#64748b" text-anchor="middle">Total invested in both: ₹22.5 lakh. Different tax treatment, different outcome.</text>

  <!-- baseline -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#cbd5e1"/>

  <!-- PPF -->
  <g>
    <rect x="130" y="240" width="120" height="130" fill="url(#ppfBar)" rx="6"/>
    <text x="190" y="295" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">₹40.7L</text>
    <text x="190" y="318" font-size="11" fill="#fff" text-anchor="middle" opacity=".85">at 7.1% (current rate)</text>
    <text x="190" y="343" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">tax-free maturity (EEE)</text>
    <text x="190" y="395" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">PPF</text>
    <text x="190" y="412" font-size="11" fill="#64748b" text-anchor="middle">15-yr lock, govt-guaranteed</text>
  </g>

  <!-- ELSS pre-tax -->
  <g>
    <rect x="340" y="135" width="120" height="235" fill="url(#elssPre)" rx="6"/>
    <text x="400" y="245" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">₹62.7L</text>
    <text x="400" y="268" font-size="11" fill="#fff" text-anchor="middle" opacity=".85">at 12% CAGR</text>
    <text x="400" y="293" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">pre-tax</text>
    <text x="400" y="395" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">ELSS (pre-tax)</text>
    <text x="400" y="412" font-size="11" fill="#64748b" text-anchor="middle">3-yr lock per instalment</text>
  </g>

  <!-- ELSS post-tax -->
  <g>
    <rect x="550" y="155" width="120" height="215" fill="url(#elssPost)" rx="6"/>
    <text x="610" y="265" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">₹58L</text>
    <text x="610" y="288" font-size="11" fill="#fff" text-anchor="middle" opacity=".85">post-tax</text>
    <text x="610" y="313" font-size="11" fill="#fff" text-anchor="middle" opacity=".75">12.5% LTCG above ₹1.25L</text>
    <text x="610" y="395" font-size="14" font-weight="700" fill="#1d4ed8" text-anchor="middle">ELSS (after tax)</text>
    <text x="610" y="412" font-size="11" fill="#64748b" text-anchor="middle">≈ ₹17L more than PPF</text>
  </g>

  <!-- Y axis hints -->
  <text x="100" y="135" font-size="10" fill="#94a3b8">₹65L</text>
  <text x="100" y="245" font-size="10" fill="#94a3b8">₹40L</text>
  <text x="100" y="370" font-size="10" fill="#94a3b8">0</text>
</svg>
