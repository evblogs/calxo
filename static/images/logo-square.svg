<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Calxo">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="512" height="512" rx="96" fill="url(#sg)"/>

  <!-- Top gloss -->
  <rect width="512" height="220" rx="96" fill="rgba(255,255,255,0.12)"/>

  <!-- Equals sign accent -->
  <rect x="340" y="92" width="84" height="18" rx="9" fill="rgba(255,255,255,0.9)"/>
  <rect x="340" y="132" width="84" height="18" rx="9" fill="rgba(255,255,255,0.9)"/>

  <!-- Big C -->
  <text x="240" y="380" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="340" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-12">C</text>

  <!-- Wordmark "calxo" at bottom -->
  <text x="256" y="478" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="-2">calxo.in</text>
</svg>
