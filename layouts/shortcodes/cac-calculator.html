<div class="cx-emi-widget" id="cx-cac">
<style>
  #cx-cac.cx-emi-widget {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem;
    margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04);
  }
  @media (max-width: 760px) { #cx-cac.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-cac label { display: block; margin-bottom: 1.15rem; }
  #cx-cac label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-cac label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-cac input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-cac input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-cac input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-cac .cx-emi-result { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-cac .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-cac .cx-emi-result > * { position: relative; }
  #cx-cac .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-cac .cx-emi-result-value { font-size: clamp(1.85rem,5vw,2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-cac .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-cac .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-cac .cx-emi-row strong { font-weight: 700; }
  #cx-cac .cx-highlight { background: rgba(255,255,255,.13); border-radius: 8px; padding: .5rem .75rem; margin-top: .5rem; font-size: .82rem; line-height: 1.45; }
</style>
<div class="cx-emi-inputs">
  <label><span>Marketing spend (₹/month) <em data-out="mkt">₹2,00,000</em></span>
    <input type="number" id="cx-cac-mkt" min="0" max="100000000" step="10000" value="200000" inputmode="numeric">
    <input type="range" id="cx-cac-mkt-r" min="0" max="2000000" step="10000" value="200000"></label>
  <label><span>Sales spend (₹/month) <em data-out="sales">₹1,00,000</em></span>
    <input type="number" id="cx-cac-sales" min="0" max="100000000" step="10000" value="100000" inputmode="numeric">
    <input type="range" id="cx-cac-sales-r" min="0" max="2000000" step="10000" value="100000"></label>
  <label><span>New customers acquired <em data-out="cust">15</em></span>
    <input type="number" id="cx-cac-cust" min="1" max="100000" step="1" value="15" inputmode="numeric">
    <input type="range" id="cx-cac-cust-r" min="1" max="500" step="1" value="15"></label>
  <label><span>Avg monthly revenue per customer (₹) <em data-out="arpu">₹5,000</em></span>
    <input type="number" id="cx-cac-arpu" min="0" max="10000000" step="500" value="5000" inputmode="numeric">
    <input type="range" id="cx-cac-arpu-r" min="0" max="100000" step="500" value="5000"></label>
  <label><span>Gross margin (%) <em data-out="gm">70%</em></span>
    <input type="number" id="cx-cac-gm" min="1" max="100" step="1" value="70" inputmode="numeric">
    <input type="range" id="cx-cac-gm-r" min="10" max="100" step="1" value="70"></label>
</div>
<div class="cx-emi-result">
  <div class="cx-emi-result-label">Customer Acquisition Cost</div>
  <div class="cx-emi-result-value" id="cx-cac-val">₹0</div>
  <div class="cx-emi-row"><span>Total spend (mkt + sales)</span><strong id="cx-cac-total">₹0</strong></div>
  <div class="cx-emi-row"><span>CAC payback period</span><strong id="cx-cac-payback">— months</strong></div>
  <div class="cx-emi-row"><span>Cost per lead (if known)</span><strong id="cx-cac-cpl">—</strong></div>
  <div class="cx-highlight" id="cx-cac-note">—</div>
</div>
</div>
<script>
(function(){
  var fmtINR=function(n){return '₹'+Math.round(n).toLocaleString('en-IN');};
  var mkt=document.getElementById('cx-cac-mkt'),mktR=document.getElementById('cx-cac-mkt-r');
  var sal=document.getElementById('cx-cac-sales'),salR=document.getElementById('cx-cac-sales-r');
  var cust=document.getElementById('cx-cac-cust'),custR=document.getElementById('cx-cac-cust-r');
  var arpu=document.getElementById('cx-cac-arpu'),arpuR=document.getElementById('cx-cac-arpu-r');
  var gm=document.getElementById('cx-cac-gm'),gmR=document.getElementById('cx-cac-gm-r');
  function compute(){
    var M=parseFloat(mkt.value)||0,S=parseFloat(sal.value)||0;
    var C=parseFloat(cust.value)||1,A=parseFloat(arpu.value)||0;
    var G=(parseFloat(gm.value)||0)/100;
    var total=M+S,cac=total/C;
    var monthlyMargin=A*G;
    var payback=monthlyMargin>0?cac/monthlyMargin:null;
    document.getElementById('cx-cac-val').textContent=fmtINR(cac);
    document.getElementById('cx-cac-total').textContent=fmtINR(total);
    document.getElementById('cx-cac-payback').textContent=payback?payback.toFixed(1)+' months':'—';
    document.getElementById('cx-cac-cpl').textContent=fmtINR(cac);
    document.getElementById('cx-cac-note').textContent=payback
      ?'At '+fmtINR(A)+'/mo ARPU and '+Math.round(G*100)+'% margin, you recover CAC in '+payback.toFixed(1)+' months'
      :'Enter ARPU to see CAC payback period';
    document.querySelector('#cx-cac [data-out="mkt"]').textContent=fmtINR(M);
    document.querySelector('#cx-cac [data-out="sales"]').textContent=fmtINR(S);
    document.querySelector('#cx-cac [data-out="cust"]').textContent=Math.round(C);
    document.querySelector('#cx-cac [data-out="arpu"]').textContent=fmtINR(A);
    document.querySelector('#cx-cac [data-out="gm"]').textContent=Math.round(G*100)+'%';
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(mkt,mktR);syncPair(sal,salR);syncPair(cust,custR);syncPair(arpu,arpuR);syncPair(gm,gmR);
  compute();
})();
</script>
