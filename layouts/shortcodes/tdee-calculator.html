<div class="cx-tdee-widget" id="cx-tdee">
<style>
  #cx-tdee {
    background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%);
    border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 1.85rem; margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15,23,42,.04);
  }
  #cx-tdee .cx-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;
  }
  @media (max-width: 600px) { #cx-tdee .cx-row { grid-template-columns: 1fr; } }
  #cx-tdee label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .85rem; font-weight: 600; color: #0f172a; margin-bottom: .35rem;
  }
  #cx-tdee label > span em { color: #2563eb; font-style: normal; font-weight: 700; }
  #cx-tdee input[type="range"] { width: 100%; accent-color: #2563eb; margin: .2rem 0; }
  #cx-tdee input[type="number"], #cx-tdee select {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .95rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-tdee input[type="number"]:focus, #cx-tdee select:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  #cx-tdee .cx-gender {
    display: flex; background: #f1f5f9; border-radius: 8px; padding: 3px; margin-bottom: 1rem;
  }
  #cx-tdee .cx-gender button {
    flex: 1; padding: .5rem; border: 0; background: transparent;
    font-size: .88rem; font-weight: 600; color: #475569; border-radius: 6px;
    cursor: pointer; transition: all .15s;
  }
  #cx-tdee .cx-gender button.active {
    background: #fff; color: #2563eb; box-shadow: 0 1px 3px rgba(15,23,42,.1);
  }
  #cx-tdee .cx-result {
    background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);
    color: #fff; border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 1rem;
  }
  #cx-tdee .cx-result-label { font-size: .8rem; opacity: .8; font-weight: 500; margin-bottom: .15rem; }
  #cx-tdee .cx-result-value { font-size: 2.2rem; font-weight: 800; letter-spacing: -.02em; }
  #cx-tdee .cx-grid4 {
    display: grid; grid-template-columns: repeat(4,1fr); gap: .5rem; margin-top: .85rem;
  }
  @media (max-width: 520px) { #cx-tdee .cx-grid4 { grid-template-columns: repeat(2,1fr); } }
  #cx-tdee .cx-mini {
    background: rgba(255,255,255,.15); border-radius: 8px;
    padding: .6rem .4rem; text-align: center;
  }
  #cx-tdee .cx-mini-val { font-size: .95rem; font-weight: 800; }
  #cx-tdee .cx-mini-lbl { font-size: .68rem; opacity: .8; margin-top: .1rem; }
  #cx-tdee .cx-result-sub { font-size: .8rem; opacity: .75; margin-top: .6rem; }
</style>

<div class="cx-gender">
  <button class="active" onclick="cxTdeeGender('male',this)">Male</button>
  <button onclick="cxTdeeGender('female',this)">Female</button>
</div>

<div class="cx-row">
  <label><span>Age (years) <em id="cx-td-agev">28</em></span>
    <input type="range" id="cx-td-ages" min="15" max="80" value="28" oninput="syncTdee('td-age')">
    <input type="number" id="cx-td-agen" value="28" min="15" max="80" oninput="syncTdee('td-age',true)">
  </label>
  <label><span>Weight (kg) <em id="cx-td-wv">70</em></span>
    <input type="range" id="cx-td-ws" min="30" max="200" value="70" oninput="syncTdee('td-w')">
    <input type="number" id="cx-td-wn" value="70" min="30" max="200" oninput="syncTdee('td-w',true)">
  </label>
</div>
<div class="cx-row">
  <label><span>Height (cm) <em id="cx-td-hv">170</em></span>
    <input type="range" id="cx-td-hs" min="100" max="220" value="170" oninput="syncTdee('td-h')">
    <input type="number" id="cx-td-hn" value="170" min="100" max="220" oninput="syncTdee('td-h',true)">
  </label>
  <label><span>Activity Level</span>
    <select id="cx-td-act" onchange="cxTdeeCalc()">
      <option value="1.2">Sedentary (desk job, no exercise)</option>
      <option value="1.375">Light (1–3 days/week)</option>
      <option value="1.55" selected>Moderate (3–5 days/week)</option>
      <option value="1.725">Active (6–7 days/week)</option>
      <option value="1.9">Very Active (athlete / physical job)</option>
    </select>
  </label>
</div>

<div class="cx-result">
  <div class="cx-result-label">Maintenance Calories (TDEE)</div>
  <div class="cx-result-value"><span id="cx-tdee-val">—</span> kcal/day</div>
  <div class="cx-grid4">
    <div class="cx-mini"><div class="cx-mini-val" id="cx-tdee-cut">—</div><div class="cx-mini-lbl">Weight Loss (-500)</div></div>
    <div class="cx-mini"><div class="cx-mini-val" id="cx-tdee-mcut">—</div><div class="cx-mini-lbl">Mild Cut (-250)</div></div>
    <div class="cx-mini"><div class="cx-mini-val" id="cx-tdee-bulk">—</div><div class="cx-mini-lbl">Mild Gain (+250)</div></div>
    <div class="cx-mini"><div class="cx-mini-val" id="cx-tdee-mbulk">—</div><div class="cx-mini-lbl">Weight Gain (+500)</div></div>
  </div>
  <div class="cx-result-sub" id="cx-tdee-sub"></div>
</div>

<script>
var cxTdeeGenderVal='male';
function cxTdeeGender(g,btn){
  cxTdeeGenderVal=g;
  document.querySelectorAll('#cx-tdee .cx-gender button').forEach(b=>b.classList.toggle('active',b===btn));
  cxTdeeCalc();
}
function syncTdee(id,fromNum){
  var s=document.getElementById('cx-'+id+'s');
  var n=document.getElementById('cx-'+id+'n');
  var v=document.getElementById('cx-'+id+'v');
  if(fromNum){s.value=n.value;}else{n.value=s.value;}
  if(v)v.textContent=s.value;
  cxTdeeCalc();
}
function cxTdeeCalc(){
  var age=parseFloat(document.getElementById('cx-td-agen').value)||0;
  var w=parseFloat(document.getElementById('cx-td-wn').value)||0;
  var h=parseFloat(document.getElementById('cx-td-hn').value)||0;
  var act=parseFloat(document.getElementById('cx-td-act').value)||1.55;
  if(!age||!w||!h)return;
  // Mifflin-St Jeor
  var bmr=cxTdeeGenderVal==='male'
    ?(10*w)+(6.25*h)-(5*age)+5
    :(10*w)+(6.25*h)-(5*age)-161;
  var tdee=Math.round(bmr*act);
  document.getElementById('cx-tdee-val').textContent=tdee.toLocaleString('en-IN');
  document.getElementById('cx-tdee-cut').textContent=(tdee-500).toLocaleString('en-IN');
  document.getElementById('cx-tdee-mcut').textContent=(tdee-250).toLocaleString('en-IN');
  document.getElementById('cx-tdee-bulk').textContent=(tdee+250).toLocaleString('en-IN');
  document.getElementById('cx-tdee-mbulk').textContent=(tdee+500).toLocaleString('en-IN');
  document.getElementById('cx-tdee-sub').textContent='BMR: '+Math.round(bmr).toLocaleString('en-IN')+' kcal · '+cxTdeeGenderVal+', '+age+'y, '+w+'kg, '+h+'cm';
}
['td-age','td-w','td-h'].forEach(id=>{
  var v=document.getElementById('cx-'+id+'v');
  if(v)v.textContent=document.getElementById('cx-'+id+'n').value;
});
cxTdeeCalc();
</script>
</div>
