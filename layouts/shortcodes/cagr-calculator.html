<div class="cx-cagr-widget" id="cx-cagr">
<style>
  #cx-cagr.cx-cagr-widget {
    display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;
    background:linear-gradient(150deg,#fff 0%,#f8fafc 100%);
    border:1px solid #e2e8f0; border-radius:16px;
    padding:1.85rem; margin:1.5rem 0 2.5rem;
    box-shadow:0 4px 20px rgba(15,23,42,.04);
  }
  @media(max-width:760px){ #cx-cagr.cx-cagr-widget { grid-template-columns:1fr; gap:1.25rem; padding:1.25rem; } }
  #cx-cagr label { display:block; margin-bottom:1.1rem; }
  #cx-cagr label > span {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.88rem; font-weight:600; color:#0f172a; margin-bottom:.4rem;
  }
  #cx-cagr label > span em { color:#2563eb; font-weight:700; font-size:.98rem; font-style:normal; }
  #cx-cagr input[type="range"]  { width:100%; height:6px; accent-color:#2563eb; margin:.35rem 0 .25rem; }
  #cx-cagr input[type="number"] {
    width:100%; padding:.6rem .8rem; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.98rem; color:#0f172a; font-weight:600; box-sizing:border-box; background:#fff;
  }
  #cx-cagr input[type="number"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  #cx-cagr .cx-result {
    background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);
    color:#fff; border-radius:12px; padding:1.5rem;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; overflow:hidden;
  }
  #cx-cagr .cx-result::before {
    content:''; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:24px 24px; pointer-events:none;
  }
  #cx-cagr .cx-result > * { position:relative; }
  #cx-cagr .cx-result-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; opacity:.85; }
  #cx-cagr .cx-result-value { font-size:clamp(2rem,5vw,2.8rem); font-weight:800; letter-spacing:-1px; line-height:1.05; margin:.2rem 0 1rem; }
  #cx-cagr .cx-row { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid rgba(255,255,255,.18); font-size:.9rem; }
  #cx-cagr .cx-row:last-of-type { border-bottom:none; }
  #cx-cagr .cx-row strong { font-weight:700; }
</style>

<div id="cx-cagr-inputs">
  <label>
    <span>Initial investment (₹) <em id="cx-cagr-iv-out">1,00,000</em></span>
    <input type="number" id="cx-cagr-iv" min="1000" max="100000000" step="1000" value="100000" inputmode="numeric">
    <input type="range" id="cx-cagr-iv-r" min="1000" max="10000000" step="1000" value="100000">
  </label>
  <label>
    <span>Final value (₹) <em id="cx-cagr-fv-out">2,00,000</em></span>
    <input type="number" id="cx-cagr-fv" min="1000" max="100000000" step="1000" value="200000" inputmode="numeric">
    <input type="range" id="cx-cagr-fv-r" min="1000" max="10000000" step="1000" value="200000">
  </label>
  <label>
    <span>Number of years <em id="cx-cagr-yr-out">5 years</em></span>
    <input type="number" id="cx-cagr-yr" min="1" max="50" step="1" value="5" inputmode="numeric">
    <input type="range" id="cx-cagr-yr-r" min="1" max="50" step="1" value="5">
  </label>
</div>

<div class="cx-result">
  <div class="cx-result-label">CAGR</div>
  <div class="cx-result-value" id="cx-cagr-main">14.87%</div>
  <div class="cx-row"><span>Total return</span><strong id="cx-cagr-total-ret">100.0%</strong></div>
  <div class="cx-row"><span>Absolute gain</span><strong id="cx-cagr-gain">₹1,00,000</strong></div>
  <div class="cx-row"><span>Doubles every</span><strong id="cx-cagr-double">5.0 yrs</strong></div>
</div>
</div>

<script>
(function(){
  function fmt(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }
  function fmtPct(n){ return n.toFixed(2)+'%'; }
  function syncPair(num,rng,outId,fmtFn){
    num.addEventListener('input',function(){ rng.value=num.value; if(outId) document.getElementById(outId).textContent=fmtFn?fmtFn(+num.value):num.value; calc(); });
    rng.addEventListener('input',function(){ num.value=rng.value; if(outId) document.getElementById(outId).textContent=fmtFn?fmtFn(+rng.value):rng.value; calc(); });
  }
  function fmtInr(v){ return v>=10000000?(v/10000000).toFixed(2)+' Cr':v>=100000?(v/100000).toFixed(2)+' L':v.toLocaleString('en-IN'); }

  var iv=document.getElementById('cx-cagr-iv'), ivr=document.getElementById('cx-cagr-iv-r');
  var fv=document.getElementById('cx-cagr-fv'), fvr=document.getElementById('cx-cagr-fv-r');
  var yr=document.getElementById('cx-cagr-yr'), yrr=document.getElementById('cx-cagr-yr-r');

  syncPair(iv,ivr,'cx-cagr-iv-out',function(v){ return fmtInr(v); });
  syncPair(fv,fvr,'cx-cagr-fv-out',function(v){ return fmtInr(v); });
  syncPair(yr,yrr,'cx-cagr-yr-out',function(v){ return v+' year'+(v>1?'s':''); });

  function calc(){
    var I=+iv.value, F=+fv.value, N=+yr.value;
    if(!I||!F||!N||F<=0||I<=0){ return; }
    var cagr=(Math.pow(F/I,1/N)-1)*100;
    var totalRet=((F-I)/I)*100;
    var gain=F-I;
    var dbl=cagr>0?(Math.log(2)/Math.log(1+cagr/100)):Infinity;

    document.getElementById('cx-cagr-main').textContent=fmtPct(cagr);
    document.getElementById('cx-cagr-total-ret').textContent=totalRet.toFixed(1)+'%';
    document.getElementById('cx-cagr-gain').textContent=(gain>=0?'₹':'-₹')+Math.abs(Math.round(gain)).toLocaleString('en-IN');
    document.getElementById('cx-cagr-double').textContent=isFinite(dbl)?dbl.toFixed(1)+' yrs':'N/A';
  }
  calc();
})();
</script>
