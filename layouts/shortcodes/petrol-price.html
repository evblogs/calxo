  #cx-pet .cx-result { background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-pet .cx-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size: 24px 24px; pointer-events: none; }

  #cx-pet .cx-pet-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid #e2e8f0; }
  #cx-pet .cx-pet-table-wrap table { width: 100%; border-collapse: collapse; font-size: .9rem; min-width: 340px; }
  #cx-pet .cx-pet-table th { text-align: left; padding: .5rem .75rem; font-size: .78rem; color: #64748b; font-weight: 600; border-bottom: 2px solid #e2e8f0; white-space: nowrap; background: #f8fafc; }
  #cx-pet .cx-pet-table td { padding: .5rem .75rem; border-bottom: 1px solid #f1f5f9; color: #0f172a; white-space: nowrap; }

  @media (max-width: 760px) {

<script>
(function () {
  var fuelType = 'petrol';
  var citySelect = document.getElementById('cx-pet-city');
  var tbody = document.getElementById('cx-pet-tbody');

  // Populate dropdown and table
  CX_PETROL.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.city;
    opt.textContent = c.city + ' (' + c.state + ')';
    citySelect.appendChild(opt);

    var tr = document.createElement('tr');
    tr.dataset.city = c.city;
    tr.innerHTML = '<td>' + c.city + '</td><td class="state-col">' + c.state + '</td>' +
      '<td class="price">₹' + c.petrol.toFixed(2) + '</td>' +
      '<td class="price">₹' + c.diesel.toFixed(2) + '</td>';
    tbody.appendChild(tr);
  });

  function render() {
    var cityName = citySelect.value;
    var found = CX_PETROL.filter(function(c){ return c.city === cityName; })[0];
    if (!found) return;
    var price = fuelType === 'petrol' ? found.petrol : found.diesel;
    var label = (fuelType === 'petrol' ? 'PETROL' : 'DIESEL') + ' PRICE IN ' + cityName.toUpperCase();
    document.getElementById('cx-pet-label').textContent = label;
    document.getElementById('cx-pet-price').textContent = '₹' + price.toFixed(2);
    document.getElementById('cx-pet-type').textContent = fuelType === 'petrol' ? 'Petrol' : 'Diesel';
    document.getElementById('cx-pet-state').textContent = found.state;
    document.getElementById('cx-pet-updated').textContent = 'Prices as of ' + CX_UPDATED;
    document.querySelectorAll('#cx-pet-tbody tr').forEach(function(r){
      r.classList.toggle('hl', r.dataset.city === cityName);
    });
  }

  window.cxPetSwitch = function(type) {
    fuelType = type;
    document.getElementById('cx-pet-p').classList.toggle('active', type === 'petrol');
    document.getElementById('cx-pet-d').classList.toggle('active', type === 'diesel');
    render();
  };

  citySelect.addEventListener('change', render);
  render();
})();
</script>
