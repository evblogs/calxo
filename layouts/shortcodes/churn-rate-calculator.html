<div class="cx-emi-widget" id="cx-churn">
<style>
  #cx-churn.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04); }
  @media (max-width: 760px) { #cx-churn.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-churn label { display: block; margin-bottom: 1.15rem; }
  #cx-churn label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-churn label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-churn input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-churn input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-churn input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-churn .cx-emi-result { border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-churn .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-churn .cx-emi-result > * { position: relative; }
  #cx-churn .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-churn .cx-emi-result-value { font-size: clamp(1.85rem,5vw,2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-churn .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-churn .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-churn .cx-emi-row strong { font-weight: 700; }
  #cx-churn .cx-verdict { border-radius: 8px; padding: .5rem .75rem; margin-top: .6rem; font-size: .83rem; font-weight: 700; text-align: center; background: rgba(255,255,255,.15); }
</style>
<div class="cx-emi-inputs">
  <label><span>Customers at start of period <em data-out="start">500</em></span>
    <input type="number" id="cx-ch-start" min="1" max="1000000" step="10" value="500" inputmode="numeric">
    <input type="range" id="cx-ch-start-r" min="10" max="10000" step="10" value="500"></label>
  <label><span>Customers lost during period <em data-out="lost">15</em></span>
    <input type="number" id="cx-ch-lost" min="0" max="1000000" step="1" value="15" inputmode="numeric">
    <input type="range" id="cx-ch-lost-r" min="0" max="500" step="1" value="15"></label>
  <label><span>MRR at start (₹) <em data-out="mrr">₹5,00,000</em></span>
    <input type="number" id="cx-ch-mrr" min="0" max="1000000000" step="10000" value="500000" inputmode="numeric">
    <input type="range" id="cx-ch-mrr-r" min="0" max="5000000" step="10000" value="500000"></label>
  <label><span>MRR churned (₹) <em data-out="mrrch">₹15,000</em></span>
    <input type="number" id="cx-ch-mrrch" min="0" max="1000000000" step="1000" value="15000" inputmode="numeric">
    <input type="range" id="cx-ch-mrrch-r" min="0" max="200000" step="1000" value="15000"></label>
</div>
<div class="cx-emi-result" id="cx-ch-panel" style="background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);color:#fff;">
  <div class="cx-emi-result-label">Monthly Churn Rate</div>
  <div class="cx-emi-result-value" id="cx-ch-rate">0%</div>
  <div class="cx-emi-row"><span>Annual churn rate</span><strong id="cx-ch-annual">0%</strong></div>
  <div class="cx-emi-row"><span>Avg customer lifetime</span><strong id="cx-ch-life">— months</strong></div>
  <div class="cx-emi-row"><span>MRR churn rate</span><strong id="cx-ch-mrrrate">0%</strong></div>
  <div class="cx-verdict" id="cx-ch-verdict">—</div>
</div>
</div>
<script>
(function(){
  var start=document.getElementById('cx-ch-start'),startR=document.getElementById('cx-ch-start-r');
  var lost=document.getElementById('cx-ch-lost'),lostR=document.getElementById('cx-ch-lost-r');
  var mrr=document.getElementById('cx-ch-mrr'),mrrR=document.getElementById('cx-ch-mrr-r');
  var mrrch=document.getElementById('cx-ch-mrrch'),mrrchR=document.getElementById('cx-ch-mrrch-r');
  var panel=document.getElementById('cx-ch-panel');
  function compute(){
    var S=parseFloat(start.value)||1,L=parseFloat(lost.value)||0;
    var M=parseFloat(mrr.value)||0,MC=parseFloat(mrrch.value)||0;
    var rate=S>0?(L/S)*100:0,annual=(1-Math.pow(1-rate/100,12))*100;
    var life=rate>0?100/rate:0;
    var mrrRate=M>0?(MC/M)*100:0;
    var bg,verdict;
    if(rate<2){bg='linear-gradient(135deg,#166534 0%,#16a34a 60%,#4ade80 100%)';verdict='World-class (<2%) — exceptional retention';}
    else if(rate<5){bg='linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%)';verdict='Good (2-5%) — industry average for SMB SaaS';}
    else if(rate<10){bg='linear-gradient(135deg,#78350f 0%,#b45309 50%,#d97706 100%)';verdict='High (5-10%) — retention needs work';}
    else{bg='linear-gradient(135deg,#7f1d1d 0%,#dc2626 55%,#f97316 100%)';verdict='Critical (>10%) — address churn immediately';}
    panel.style.background=bg;
    document.getElementById('cx-ch-rate').textContent=rate.toFixed(2)+'%';
    document.getElementById('cx-ch-annual').textContent=annual.toFixed(1)+'%';
    document.getElementById('cx-ch-life').textContent=rate>0?life.toFixed(1)+' months':'—';
    document.getElementById('cx-ch-mrrrate').textContent=mrrRate.toFixed(2)+'%';
    document.getElementById('cx-ch-verdict').textContent=verdict;
    document.querySelector('#cx-churn [data-out="start"]').textContent=Math.round(S).toLocaleString('en-IN');
    document.querySelector('#cx-churn [data-out="lost"]').textContent=Math.round(L);
    document.querySelector('#cx-churn [data-out="mrr"]').textContent='₹'+Math.round(M).toLocaleString('en-IN');
    document.querySelector('#cx-churn [data-out="mrrch"]').textContent='₹'+Math.round(MC).toLocaleString('en-IN');
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(start,startR);syncPair(lost,lostR);syncPair(mrr,mrrR);syncPair(mrrch,mrrchR);
  compute();
})();
</script>
