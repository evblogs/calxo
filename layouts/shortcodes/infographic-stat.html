{{/* Big-stat infographic. Usage:
{{< infographic-stat number="₹12.75L" label="Salaried income now pays zero tax under new regime" sub="FY 2025-26 onwards" >}}
*/}}
<div class="cx-info-stat">
  <div class="cx-info-stat-number">{{ .Get "number" }}</div>
  <div class="cx-info-stat-label">{{ .Get "label" }}</div>
  {{ with .Get "sub" }}<div class="cx-info-stat-sub">{{ . }}</div>{{ end }}
</div>
<style>
  .cx-info-stat {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff;
    border-radius: 14px;
    padding: 1.6rem 1.5rem;
    margin: 1.5rem 0 1.75rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .cx-info-stat::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }
  .cx-info-stat > * { position: relative; }
  .cx-info-stat-number {
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1.5px;
    margin-bottom: .65rem;
  }
  .cx-info-stat-label {
    font-size: 1rem;
    line-height: 1.45;
    opacity: .95;
    max-width: 480px;
    margin: 0 auto;
  }
  .cx-info-stat-sub {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: .8;
    margin-top: .8rem;
  }
</style>
