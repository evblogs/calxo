<div class="cx-emi-widget" id="cx-ppf">
<style>
  #cx-ppf.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15, 23, 42, .04); }
  @media (max-width: 760px) { #cx-ppf.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-ppf label { display: block; margin-bottom: 1.15rem; }
  #cx-ppf label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-ppf label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-ppf input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-ppf input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-ppf input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
  #cx-ppf .cx-emi-result { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-ppf .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-ppf .cx-emi-result > * { position: relative; }
  #cx-ppf .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-ppf .cx-emi-result-value { font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-ppf .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255, 255, 255, .18); font-size: .9rem; }
  #cx-ppf .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-ppf .cx-emi-row strong { font-weight: 700; }
  #cx-ppf .cx-emi-bar { display: flex; height: 9px; border-radius: 5px; overflow: hidden; margin: 1rem 0 .5rem; background: rgba(255, 255, 255, .12); }
  #cx-ppf .cx-emi-bar-p { background: #ffffff; transition: width .25s ease; }
  #cx-ppf .cx-emi-bar-i { background: rgba(255, 255, 255, .42); transition: width .25s ease; }
  #cx-ppf .cx-emi-legend { display: flex; gap: 1rem; font-size: .76rem; color: rgba(255, 255, 255, .9); }
  #cx-ppf .cx-emi-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: .35rem; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Annual contribution (₹) <em data-out="amt">1,50,000</em></span>
    <input type="number" id="cx-ppf-amt" min="500" max="150000" step="500" value="150000" inputmode="numeric">
    <input type="range" id="cx-ppf-amt-r" min="500" max="150000" step="500" value="150000">
  </label>
  <label>
    <span>Interest rate p.a. (%) <em data-out="rate">7.10%</em></span>
    <input type="number" id="cx-ppf-rate" min="6" max="9" step="0.05" value="7.1" inputmode="decimal">
    <input type="range" id="cx-ppf-rate-r" min="6" max="9" step="0.05" value="7.1">
  </label>
  <label>
    <span>Tenure (years, min 15) <em data-out="years">15 yrs</em></span>
    <input type="number" id="cx-ppf-years" min="15" max="50" step="5" value="15" inputmode="numeric">
    <input type="range" id="cx-ppf-years-r" min="15" max="40" step="5" value="15">
  </label>
  <p style="font-size:.78rem;color:#64748b;margin-top:-.4rem;line-height:1.5;">
    PPF max contribution is ₹1.5L per FY (combined across all your accounts). Tenure is 15 years, extendable in 5-year blocks.
  </p>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Maturity value</div>
  <div class="cx-emi-result-value" id="cx-ppf-fv">₹40,68,209</div>
  <div class="cx-emi-row"><span>Total invested</span> <strong id="cx-ppf-invested">₹22,50,000</strong></div>
  <div class="cx-emi-row"><span>Interest earned</span> <strong id="cx-ppf-interest">₹18,18,209</strong></div>
  <div class="cx-emi-row"><span>Wealth gain ratio</span> <strong id="cx-ppf-ratio">1.81×</strong></div>
  <div class="cx-emi-bar">
    <div class="cx-emi-bar-p" id="cx-ppf-bar-p" style="width:55%"></div>
    <div class="cx-emi-bar-i" id="cx-ppf-bar-i" style="width:45%"></div>
  </div>
  <div class="cx-emi-legend">
    <span><span class="cx-emi-dot" style="background:#fff"></span>Invested <span id="cx-ppf-pct-p">55%</span></span>
    <span><span class="cx-emi-dot" style="background:rgba(255,255,255,.4)"></span>Interest <span id="cx-ppf-pct-i">45%</span></span>
  </div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtRaw = function (n) { return Math.round(n).toLocaleString('en-IN'); };

  var amt = document.getElementById('cx-ppf-amt');
  var amtR = document.getElementById('cx-ppf-amt-r');
  var rate = document.getElementById('cx-ppf-rate');
  var rateR = document.getElementById('cx-ppf-rate-r');
  var yrs = document.getElementById('cx-ppf-years');
  var yrsR = document.getElementById('cx-ppf-years-r');

  function compute() {
    var P = parseFloat(amt.value) || 0;
    var r = (parseFloat(rate.value) || 0) / 100;
    var n = parseFloat(yrs.value) || 0;

    // Annual deposit at start of year, compounded annually
    // M = P × ((1+r)^n - 1) / r × (1+r)
    var fv = 0;
    if (r === 0) fv = P * n;
    else fv = P * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);

    var invested = P * n;
    var interest = fv - invested;
    var ratio = invested > 0 ? fv / invested : 0;
    var pctP = fv > 0 ? Math.round((invested / fv) * 100) : 0;
    var pctI = 100 - pctP;

    document.getElementById('cx-ppf-fv').textContent = fmtINR(fv);
    document.getElementById('cx-ppf-invested').textContent = fmtINR(invested);
    document.getElementById('cx-ppf-interest').textContent = fmtINR(interest);
    document.getElementById('cx-ppf-ratio').textContent = ratio.toFixed(2) + '×';
    document.getElementById('cx-ppf-bar-p').style.width = pctP + '%';
    document.getElementById('cx-ppf-bar-i').style.width = pctI + '%';
    document.getElementById('cx-ppf-pct-p').textContent = pctP + '%';
    document.getElementById('cx-ppf-pct-i').textContent = pctI + '%';

    document.querySelector('#cx-ppf [data-out="amt"]').textContent = fmtRaw(P);
    document.querySelector('#cx-ppf [data-out="rate"]').textContent = (parseFloat(rate.value) || 0).toFixed(2) + '%';
    document.querySelector('#cx-ppf [data-out="years"]').textContent = n + ' yr' + (n !== 1 ? 's' : '');
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }
  syncPair(amt, amtR); syncPair(rate, rateR); syncPair(yrs, yrsR);
  compute();
})();
</script>
