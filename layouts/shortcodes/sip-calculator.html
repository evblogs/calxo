<div class="cx-emi-widget" id="cx-sip">
<style>
  /* Reuses base widget styles from emi-calculator if both are on same page */
  #cx-sip.cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-sip.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-sip label { display: block; margin-bottom: 1.15rem; }
  #cx-sip label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-sip label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-sip input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-sip input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-sip input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-sip .cx-emi-result {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff; border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cx-sip .cx-emi-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-sip .cx-emi-result > * { position: relative; }
  #cx-sip .cx-emi-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-sip .cx-emi-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem;
  }
  #cx-sip .cx-emi-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255, 255, 255, .18); font-size: .9rem;
  }
  #cx-sip .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-sip .cx-emi-row strong { font-weight: 700; }
  #cx-sip .cx-emi-bar {
    display: flex; height: 9px; border-radius: 5px; overflow: hidden;
    margin: 1rem 0 .5rem; background: rgba(255, 255, 255, .12);
  }
  #cx-sip .cx-emi-bar-p { background: #ffffff; transition: width .25s ease; }
  #cx-sip .cx-emi-bar-i { background: rgba(255, 255, 255, .42); transition: width .25s ease; }
  #cx-sip .cx-emi-legend {
    display: flex; gap: 1rem; font-size: .76rem; color: rgba(255, 255, 255, .9);
  }
  #cx-sip .cx-emi-dot {
    width: 9px; height: 9px; border-radius: 50%;
    display: inline-block; vertical-align: middle; margin-right: .35rem;
  }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Monthly investment (₹) <em data-out="amt">5,000</em></span>
    <input type="number" id="cx-sip-amt" min="100" max="10000000" step="500" value="5000" inputmode="numeric">
    <input type="range" id="cx-sip-amt-r" min="500" max="100000" step="500" value="5000">
  </label>
  <label>
    <span>Expected return rate p.a. (%) <em data-out="rate">12.00%</em></span>
    <input type="number" id="cx-sip-rate" min="1" max="30" step="0.5" value="12" inputmode="decimal">
    <input type="range" id="cx-sip-rate-r" min="1" max="20" step="0.5" value="12">
  </label>
  <label>
    <span>Investment duration (years) <em data-out="years">10 yrs</em></span>
    <input type="number" id="cx-sip-years" min="1" max="40" step="1" value="10" inputmode="numeric">
    <input type="range" id="cx-sip-years-r" min="1" max="35" step="1" value="10">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Future Value</div>
  <div class="cx-emi-result-value" id="cx-sip-fv">₹11,61,695</div>
  <div class="cx-emi-row"><span>Total invested</span> <strong id="cx-sip-invested">₹6,00,000</strong></div>
  <div class="cx-emi-row"><span>Estimated returns</span> <strong id="cx-sip-returns">₹5,61,695</strong></div>
  <div class="cx-emi-row"><span>Wealth gain ratio</span> <strong id="cx-sip-ratio">1.94×</strong></div>
  <div class="cx-emi-bar">
    <div class="cx-emi-bar-p" id="cx-sip-bar-p" style="width:52%"></div>
    <div class="cx-emi-bar-i" id="cx-sip-bar-i" style="width:48%"></div>
  </div>
  <div class="cx-emi-legend">
    <span><span class="cx-emi-dot" style="background:#fff"></span>Invested <span id="cx-sip-pct-p">52%</span></span>
    <span><span class="cx-emi-dot" style="background:rgba(255,255,255,.4)"></span>Returns <span id="cx-sip-pct-i">48%</span></span>
  </div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtRaw = function (n) { return Math.round(n).toLocaleString('en-IN'); };

  var amt = document.getElementById('cx-sip-amt');
  var amtR = document.getElementById('cx-sip-amt-r');
  var rate = document.getElementById('cx-sip-rate');
  var rateR = document.getElementById('cx-sip-rate-r');
  var yrs = document.getElementById('cx-sip-years');
  var yrsR = document.getElementById('cx-sip-years-r');

  function compute() {
    var P = parseFloat(amt.value) || 0;
    var aRate = parseFloat(rate.value) || 0;
    var years = parseFloat(yrs.value) || 0;
    var i = aRate / 12 / 100;
    var n = years * 12;

    var fv = 0;
    if (P > 0 && years > 0) {
      if (i === 0) {
        fv = P * n;
      } else {
        fv = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
      }
    }
    var invested = P * n;
    var returns = fv - invested;
    var ratio = invested > 0 ? (fv / invested) : 0;
    var pctP = fv > 0 ? Math.round((invested / fv) * 100) : 0;
    var pctI = 100 - pctP;

    document.getElementById('cx-sip-fv').textContent = fmtINR(fv);
    document.getElementById('cx-sip-invested').textContent = fmtINR(invested);
    document.getElementById('cx-sip-returns').textContent = fmtINR(returns);
    document.getElementById('cx-sip-ratio').textContent = ratio.toFixed(2) + '×';
    document.getElementById('cx-sip-bar-p').style.width = pctP + '%';
    document.getElementById('cx-sip-bar-i').style.width = pctI + '%';
    document.getElementById('cx-sip-pct-p').textContent = pctP + '%';
    document.getElementById('cx-sip-pct-i').textContent = pctI + '%';

    document.querySelector('#cx-sip [data-out="amt"]').textContent = fmtRaw(P);
    document.querySelector('#cx-sip [data-out="rate"]').textContent = aRate.toFixed(2) + '%';
    document.querySelector('#cx-sip [data-out="years"]').textContent = years + ' yr' + (years !== 1 ? 's' : '');
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(amt, amtR);
  syncPair(rate, rateR);
  syncPair(yrs, yrsR);
  compute();
})();
</script>
