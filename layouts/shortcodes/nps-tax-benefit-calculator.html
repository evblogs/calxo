<div class="cx-emi-widget" id="cx-npstax">
<style>
  #cx-npstax.cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-npstax.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-npstax label { display: block; margin-bottom: 1.15rem; }
  #cx-npstax label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-npstax label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-npstax input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-npstax input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-npstax input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-npstax .cx-emi-result {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff; border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cx-npstax .cx-emi-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-npstax .cx-emi-result > * { position: relative; }
  #cx-npstax .cx-emi-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-npstax .cx-emi-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem;
  }
  #cx-npstax .cx-emi-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem;
  }
  #cx-npstax .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-npstax .cx-emi-row strong { font-weight: 700; }
  #cx-npstax .cx-slab-badge {
    display: inline-block; background: rgba(255,255,255,.2);
    border-radius: 6px; padding: .2rem .55rem; font-size: .8rem;
    font-weight: 700; margin-bottom: .6rem;
  }
  #cx-npstax .cx-highlight {
    background: rgba(255,255,255,.13); border-radius: 8px;
    padding: .5rem .75rem; margin-top: .5rem;
    font-size: .82rem; line-height: 1.45;
  }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Annual taxable income (₹) <em data-out="income">₹12,00,000</em></span>
    <input type="number" id="cx-nt-income" min="250001" max="10000000" step="50000" value="1200000" inputmode="numeric">
    <input type="range" id="cx-nt-income-r" min="500000" max="5000000" step="50000" value="1200000">
  </label>
  <label>
    <span>NPS contribution 80CCD(1B) (₹) <em data-out="nps">₹50,000</em></span>
    <input type="number" id="cx-nt-nps" min="1000" max="50000" step="1000" value="50000" inputmode="numeric">
    <input type="range" id="cx-nt-nps-r" min="1000" max="50000" step="1000" value="50000">
  </label>
  <label>
    <span>80C already used (₹) <em data-out="c80">₹1,50,000</em></span>
    <input type="number" id="cx-nt-c80" min="0" max="150000" step="10000" value="150000" inputmode="numeric">
    <input type="range" id="cx-nt-c80-r" min="0" max="150000" step="10000" value="150000">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Tax saved via NPS 80CCD(1B)</div>
  <div class="cx-emi-result-value" id="cx-nt-saved">₹0</div>
  <div class="cx-slab-badge" id="cx-nt-slab">30% slab</div>
  <div class="cx-emi-row"><span>NPS invested</span> <strong id="cx-nt-invested">₹50,000</strong></div>
  <div class="cx-emi-row"><span>Net cost after tax saving</span> <strong id="cx-nt-netcost">₹0</strong></div>
  <div class="cx-emi-row"><span>Effective NPS return needed to break even</span> <strong id="cx-nt-breakeven">0%</strong></div>
  <div class="cx-highlight" id="cx-nt-note">—</div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };

  var income  = document.getElementById('cx-nt-income');
  var incomeR = document.getElementById('cx-nt-income-r');
  var nps     = document.getElementById('cx-nt-nps');
  var npsR    = document.getElementById('cx-nt-nps-r');
  var c80     = document.getElementById('cx-nt-c80');
  var c80R    = document.getElementById('cx-nt-c80-r');

  function getTaxRate(income) {
    // Old regime FY 2025-26 marginal slab
    if (income <= 250000) return 0;
    if (income <= 500000) return 0.05;
    if (income <= 1000000) return 0.20;
    return 0.30;
  }

  function compute() {
    var Y   = parseFloat(income.value) || 0;
    var N   = Math.min(parseFloat(nps.value) || 0, 50000);
    var C80 = Math.min(parseFloat(c80.value) || 0, 150000);

    // Taxable income after 80C (already applied by user)
    var taxableAfter80C = Math.max(0, Y - C80);
    var rate  = getTaxRate(taxableAfter80C);
    var cess  = 0.04;
    var effRate = rate * (1 + cess);

    var taxSaved = N * effRate;
    var netCost  = N - taxSaved;

    var slabLabel = rate === 0 ? '0% slab' : rate === 0.05 ? '5% slab' : rate === 0.20 ? '20% slab' : '30% slab';

    // Break-even: the return rate at which NPS corpus tax benefit is recovered
    // Simple proxy: taxSaved / N expressed as yield
    var breakeven = N > 0 ? (taxSaved / N) * 100 : 0;

    document.getElementById('cx-nt-saved').textContent    = fmtINR(taxSaved);
    document.getElementById('cx-nt-slab').textContent     = slabLabel;
    document.getElementById('cx-nt-invested').textContent = fmtINR(N);
    document.getElementById('cx-nt-netcost').textContent  = fmtINR(netCost);
    document.getElementById('cx-nt-breakeven').textContent = breakeven.toFixed(1) + '% immediate return';
    document.getElementById('cx-nt-note').textContent     =
      'You invest ' + fmtINR(N) + ', govt gives back ' + fmtINR(taxSaved) + ' — net cost is only ' + fmtINR(netCost);

    document.querySelector('#cx-npstax [data-out="income"]').textContent = fmtINR(Y);
    document.querySelector('#cx-npstax [data-out="nps"]').textContent    = fmtINR(N);
    document.querySelector('#cx-npstax [data-out="c80"]').textContent    = fmtINR(Math.min(parseFloat(c80.value)||0, 150000));
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(income, incomeR);
  syncPair(nps, npsR);
  syncPair(c80, c80R);
  compute();
})();
</script>
