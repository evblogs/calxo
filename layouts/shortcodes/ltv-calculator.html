<div class="cx-emi-widget" id="cx-ltv">
<style>
  #cx-ltv.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04); }
  @media (max-width: 760px) { #cx-ltv.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-ltv label { display: block; margin-bottom: 1.15rem; }
  #cx-ltv label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-ltv label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-ltv input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-ltv input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-ltv input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-ltv .cx-emi-result { background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-ltv .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-ltv .cx-emi-result > * { position: relative; }
  #cx-ltv .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-ltv .cx-emi-result-value { font-size: clamp(1.85rem,5vw,2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-ltv .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-ltv .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-ltv .cx-emi-row strong { font-weight: 700; }
  #cx-ltv .cx-health { border-radius: 8px; padding: .5rem .75rem; margin-top: .5rem; font-size: .85rem; font-weight: 700; text-align: center; }
</style>
<div class="cx-emi-inputs">
  <label><span>Avg monthly revenue per customer (₹) <em data-out="arpu">₹5,000</em></span>
    <input type="number" id="cx-ltv-arpu" min="1" max="10000000" step="500" value="5000" inputmode="numeric">
    <input type="range" id="cx-ltv-arpu-r" min="100" max="100000" step="500" value="5000"></label>
  <label><span>Gross margin (%) <em data-out="gm">70%</em></span>
    <input type="number" id="cx-ltv-gm" min="1" max="100" step="1" value="70" inputmode="numeric">
    <input type="range" id="cx-ltv-gm-r" min="10" max="100" step="1" value="70"></label>
  <label><span>Monthly churn rate (%) <em data-out="churn">3%</em></span>
    <input type="number" id="cx-ltv-churn" min="0.1" max="50" step="0.1" value="3" inputmode="decimal">
    <input type="range" id="cx-ltv-churn-r" min="0.5" max="20" step="0.1" value="3"></label>
</div>
<div class="cx-emi-result">
  <div class="cx-emi-result-label">Customer Lifetime Value (LTV)</div>
  <div class="cx-emi-result-value" id="cx-ltv-val">₹0</div>
  <div class="cx-emi-row"><span>Avg customer lifetime</span><strong id="cx-ltv-life">— months</strong></div>
  <div class="cx-emi-row"><span>Annual revenue per customer</span><strong id="cx-ltv-annual">₹0</strong></div>
  <div class="cx-emi-row"><span>Gross profit per customer</span><strong id="cx-ltv-gp">₹0</strong></div>
  <div class="cx-health" id="cx-ltv-note">—</div>
</div>
</div>
<script>
(function(){
  var fmtINR=function(n){return '₹'+Math.round(n).toLocaleString('en-IN');};
  var arpu=document.getElementById('cx-ltv-arpu'),arpuR=document.getElementById('cx-ltv-arpu-r');
  var gm=document.getElementById('cx-ltv-gm'),gmR=document.getElementById('cx-ltv-gm-r');
  var churn=document.getElementById('cx-ltv-churn'),churnR=document.getElementById('cx-ltv-churn-r');
  function compute(){
    var A=parseFloat(arpu.value)||0,G=(parseFloat(gm.value)||0)/100;
    var ch=(parseFloat(churn.value)||0)/100;
    var life=ch>0?1/ch:0;
    var ltv=ch>0?(A*G)/ch:0;
    var annual=A*12,gp=ltv;
    document.getElementById('cx-ltv-val').textContent=fmtINR(ltv);
    document.getElementById('cx-ltv-life').textContent=life.toFixed(1)+' months';
    document.getElementById('cx-ltv-annual').textContent=fmtINR(annual);
    document.getElementById('cx-ltv-gp').textContent=fmtINR(gp);
    document.getElementById('cx-ltv-note').textContent='Avg customer stays '+life.toFixed(1)+' months and generates '+fmtINR(ltv)+' in lifetime gross profit';
    document.querySelector('#cx-ltv [data-out="arpu"]').textContent=fmtINR(A);
    document.querySelector('#cx-ltv [data-out="gm"]').textContent=Math.round(G*100)+'%';
    document.querySelector('#cx-ltv [data-out="churn"]').textContent=(parseFloat(churn.value)||0).toFixed(1)+'%';
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(arpu,arpuR);syncPair(gm,gmR);syncPair(churn,churnR);
  compute();
})();
</script>
