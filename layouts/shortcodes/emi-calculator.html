<div class="cx-emi-widget" id="cx-emi">
<style>
  .cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    .cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  .cx-emi-widget label {
    display: block;
    margin-bottom: 1.15rem;
  }
  .cx-emi-widget label > span {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: .88rem;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: .4rem;
  }
  .cx-emi-widget label > span em {
    color: #2563eb;
    font-weight: 700;
    font-size: .98rem;
    font-style: normal;
  }
  .cx-emi-widget input[type="range"] {
    width: 100%;
    height: 6px;
    accent-color: #2563eb;
    margin: .35rem 0 .25rem;
  }
  .cx-emi-widget input[type="number"] {
    width: 100%;
    padding: .6rem .8rem;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: .98rem;
    color: #0f172a;
    font-weight: 600;
    box-sizing: border-box;
    background: #fff;
  }
  .cx-emi-widget input[type="number"]:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  .cx-emi-result {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff;
    border-radius: 12px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .cx-emi-result::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }
  .cx-emi-result > * { position: relative; }
  .cx-emi-result-label {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: .85;
  }
  .cx-emi-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.05;
    margin: .25rem 0 1.1rem;
  }
  .cx-emi-row {
    display: flex;
    justify-content: space-between;
    padding: .55rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, .18);
    font-size: .9rem;
  }
  .cx-emi-row:last-of-type { border-bottom: none; }
  .cx-emi-row strong { font-weight: 700; }
  .cx-emi-bar {
    display: flex;
    height: 9px;
    border-radius: 5px;
    overflow: hidden;
    margin: 1rem 0 .5rem;
    background: rgba(255, 255, 255, .12);
  }
  .cx-emi-bar-p { background: #ffffff; transition: width .25s ease; }
  .cx-emi-bar-i { background: rgba(255, 255, 255, .42); transition: width .25s ease; }
  .cx-emi-legend {
    display: flex;
    gap: 1rem;
    font-size: .76rem;
    color: rgba(255, 255, 255, .9);
  }
  .cx-emi-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
    vertical-align: middle;
    margin-right: .35rem;
  }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Loan amount (₹) <em data-out="amt">25,00,000</em></span>
    <input type="number" id="cx-emi-amt" min="10000" max="100000000" step="10000" value="2500000" inputmode="numeric">
    <input type="range" id="cx-emi-amt-r" min="100000" max="50000000" step="50000" value="2500000">
  </label>
  <label>
    <span>Annual interest rate (%) <em data-out="rate">8.50%</em></span>
    <input type="number" id="cx-emi-rate" min="1" max="30" step="0.05" value="8.5" inputmode="decimal">
    <input type="range" id="cx-emi-rate-r" min="1" max="20" step="0.05" value="8.5">
  </label>
  <label>
    <span>Loan tenure (years) <em data-out="years">20 yrs</em></span>
    <input type="number" id="cx-emi-years" min="1" max="40" step="1" value="20" inputmode="numeric">
    <input type="range" id="cx-emi-years-r" min="1" max="30" step="1" value="20">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Monthly EMI</div>
  <div class="cx-emi-result-value" id="cx-emi-monthly">₹21,696</div>
  <div class="cx-emi-row"><span>Principal</span> <strong id="cx-emi-principal">₹25,00,000</strong></div>
  <div class="cx-emi-row"><span>Total interest</span> <strong id="cx-emi-interest">₹27,07,049</strong></div>
  <div class="cx-emi-row"><span>Total payment</span> <strong id="cx-emi-total">₹52,07,049</strong></div>
  <div class="cx-emi-bar">
    <div class="cx-emi-bar-p" id="cx-emi-bar-p" style="width:48%"></div>
    <div class="cx-emi-bar-i" id="cx-emi-bar-i" style="width:52%"></div>
  </div>
  <div class="cx-emi-legend">
    <span><span class="cx-emi-dot" style="background:#fff"></span>Principal <span id="cx-emi-pct-p">48%</span></span>
    <span><span class="cx-emi-dot" style="background:rgba(255,255,255,.4)"></span>Interest <span id="cx-emi-pct-i">52%</span></span>
  </div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtRaw = function (n) { return Math.round(n).toLocaleString('en-IN'); };

  var amt = document.getElementById('cx-emi-amt');
  var amtR = document.getElementById('cx-emi-amt-r');
  var rate = document.getElementById('cx-emi-rate');
  var rateR = document.getElementById('cx-emi-rate-r');
  var yrs = document.getElementById('cx-emi-years');
  var yrsR = document.getElementById('cx-emi-years-r');

  function compute() {
    var P = parseFloat(amt.value) || 0;
    var aRate = parseFloat(rate.value) || 0;
    var years = parseFloat(yrs.value) || 0;
    var r = aRate / 12 / 100;
    var n = years * 12;

    var emi = 0;
    if (P > 0 && years > 0) {
      if (r === 0) {
        emi = P / n;
      } else {
        emi = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
      }
    }
    var total = emi * n;
    var interest = total - P;
    var pctP = total > 0 ? Math.round((P / total) * 100) : 0;
    var pctI = 100 - pctP;

    document.getElementById('cx-emi-monthly').textContent = fmtINR(emi);
    document.getElementById('cx-emi-principal').textContent = fmtINR(P);
    document.getElementById('cx-emi-interest').textContent = fmtINR(interest);
    document.getElementById('cx-emi-total').textContent = fmtINR(total);
    document.getElementById('cx-emi-bar-p').style.width = pctP + '%';
    document.getElementById('cx-emi-bar-i').style.width = pctI + '%';
    document.getElementById('cx-emi-pct-p').textContent = pctP + '%';
    document.getElementById('cx-emi-pct-i').textContent = pctI + '%';

    document.querySelector('[data-out="amt"]').textContent = fmtRaw(P);
    document.querySelector('[data-out="rate"]').textContent = aRate.toFixed(2) + '%';
    document.querySelector('[data-out="years"]').textContent = years + ' yr' + (years !== 1 ? 's' : '');
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(amt, amtR);
  syncPair(rate, rateR);
  syncPair(yrs, yrsR);
  compute();
})();
</script>
