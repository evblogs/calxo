<div class="cx-emi-widget" id="cx-ccpay">
<style>
  #cx-ccpay.cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-ccpay.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-ccpay label { display: block; margin-bottom: 1.15rem; }
  #cx-ccpay label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-ccpay label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-ccpay input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-ccpay input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-ccpay input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-ccpay .cx-emi-result {
    background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 55%, #f97316 100%);
    color: #fff; border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cx-ccpay .cx-emi-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-ccpay .cx-emi-result > * { position: relative; }
  #cx-ccpay .cx-emi-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-ccpay .cx-emi-result-value {
    font-size: clamp(1.6rem, 4.5vw, 2.2rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.1; margin: .25rem 0 1.1rem;
  }
  #cx-ccpay .cx-emi-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem;
  }
  #cx-ccpay .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-ccpay .cx-emi-row strong { font-weight: 700; }
  #cx-ccpay .cx-payoff-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: .4rem; margin-top: .75rem;
  }
  #cx-ccpay .cx-payoff-cell {
    background: rgba(255,255,255,.12); border-radius: 8px;
    padding: .45rem .4rem; text-align: center; font-size: .78rem;
  }
  #cx-ccpay .cx-payoff-cell strong { display: block; font-size: .95rem; font-weight: 800; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Outstanding balance (₹) <em data-out="bal">₹50,000</em></span>
    <input type="number" id="cx-cc-bal" min="1000" max="10000000" step="1000" value="50000" inputmode="numeric">
    <input type="range" id="cx-cc-bal-r" min="1000" max="500000" step="1000" value="50000">
  </label>
  <label>
    <span>Monthly interest rate (%) <em data-out="mrate">3.50%</em></span>
    <input type="number" id="cx-cc-rate" min="0.5" max="5" step="0.05" value="3.5" inputmode="decimal">
    <input type="range" id="cx-cc-rate-r" min="1" max="5" step="0.05" value="3.5">
  </label>
  <label>
    <span>Monthly payment (₹) <em data-out="pay">₹5,000</em></span>
    <input type="number" id="cx-cc-pay" min="100" max="10000000" step="500" value="5000" inputmode="numeric">
    <input type="range" id="cx-cc-pay-r" min="500" max="100000" step="500" value="5000">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Months to pay off</div>
  <div class="cx-emi-result-value" id="cx-cc-months">—</div>
  <div class="cx-emi-row"><span>Total paid</span> <strong id="cx-cc-total">₹0</strong></div>
  <div class="cx-emi-row"><span>Interest paid</span> <strong id="cx-cc-interest">₹0</strong></div>
  <div class="cx-payoff-grid">
    <div class="cx-payoff-cell">Pay off in 12 mo<strong id="cx-cc-p12">—</strong>/mo</div>
    <div class="cx-payoff-cell">Pay off in 24 mo<strong id="cx-cc-p24">—</strong>/mo</div>
    <div class="cx-payoff-cell">Pay off in 36 mo<strong id="cx-cc-p36">—</strong>/mo</div>
  </div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };

  var bal   = document.getElementById('cx-cc-bal');
  var balR  = document.getElementById('cx-cc-bal-r');
  var rate  = document.getElementById('cx-cc-rate');
  var rateR = document.getElementById('cx-cc-rate-r');
  var pay   = document.getElementById('cx-cc-pay');
  var payR  = document.getElementById('cx-cc-pay-r');

  function emiForN(B, i, n) {
    if (i === 0) return B / n;
    return B * i * Math.pow(1 + i, n) / (Math.pow(1 + i, n) - 1);
  }

  function compute() {
    var B = parseFloat(bal.value) || 0;
    var i = (parseFloat(rate.value) || 0) / 100;
    var P = parseFloat(pay.value) || 0;

    var monthsEl = document.getElementById('cx-cc-months');
    var totalEl  = document.getElementById('cx-cc-total');
    var intEl    = document.getElementById('cx-cc-interest');

    if (P <= B * i) {
      monthsEl.textContent = 'Never (payment too low)';
      totalEl.textContent  = '—';
      intEl.textContent    = '—';
    } else {
      var months = i === 0
        ? Math.ceil(B / P)
        : Math.ceil(-Math.log(1 - B * i / P) / Math.log(1 + i));
      var total    = P * months;
      var interest = total - B;
      var y = Math.floor(months / 12), m = months % 12;
      var label = (y > 0 ? y + ' yr' + (y > 1 ? 's' : '') + ' ' : '') + (m > 0 ? m + ' mo' : '');
      monthsEl.textContent = label || '< 1 mo';
      totalEl.textContent  = fmtINR(total);
      intEl.textContent    = fmtINR(interest);
    }

    document.getElementById('cx-cc-p12').textContent = fmtINR(emiForN(B, i, 12));
    document.getElementById('cx-cc-p24').textContent = fmtINR(emiForN(B, i, 24));
    document.getElementById('cx-cc-p36').textContent = fmtINR(emiForN(B, i, 36));

    document.querySelector('#cx-ccpay [data-out="bal"]').textContent   = fmtINR(B);
    document.querySelector('#cx-ccpay [data-out="mrate"]').textContent = (parseFloat(rate.value)||0).toFixed(2) + '%';
    document.querySelector('#cx-ccpay [data-out="pay"]').textContent   = fmtINR(P);
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(bal, balR);
  syncPair(rate, rateR);
  syncPair(pay, payR);
  compute();
})();
</script>
