<div class="cx-emi-widget" id="cx-car">
<style>
  #cx-car.cx-emi-widget {
    display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;
    background:linear-gradient(150deg,#fff 0%,#f8fafc 100%);
    border:1px solid #e2e8f0; border-radius:16px;
    padding:1.85rem; margin:1.5rem 0 2.5rem;
    box-shadow:0 4px 20px rgba(15,23,42,.04);
  }
  @media(max-width:760px){ #cx-car.cx-emi-widget { grid-template-columns:1fr; gap:1.25rem; padding:1.25rem; } }
  #cx-car label { display:block; margin-bottom:1.1rem; }
  #cx-car label > span {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.88rem; font-weight:600; color:#0f172a; margin-bottom:.4rem;
  }
  #cx-car label > span em { color:#2563eb; font-weight:700; font-size:.98rem; font-style:normal; }
  #cx-car input[type="range"]  { width:100%; height:6px; accent-color:#2563eb; margin:.35rem 0 .25rem; }
  #cx-car input[type="number"] {
    width:100%; padding:.6rem .8rem; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.98rem; color:#0f172a; font-weight:600; box-sizing:border-box; background:#fff;
  }
  #cx-car input[type="number"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  #cx-car .cx-emi-result {
    background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);
    color:#fff; border-radius:12px; padding:1.5rem;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; overflow:hidden;
  }
  #cx-car .cx-emi-result::before {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:24px 24px; pointer-events:none;
  }
  #cx-car .cx-emi-result > * { position:relative; }
  #cx-car .cx-emi-result-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; opacity:.85; }
  #cx-car .cx-emi-result-value { font-size:clamp(1.85rem,5vw,2.4rem); font-weight:800; letter-spacing:-1px; line-height:1.05; margin:.25rem 0 1.1rem; }
  #cx-car .cx-emi-row { display:flex; justify-content:space-between; padding:.55rem 0; border-bottom:1px solid rgba(255,255,255,.18); font-size:.9rem; }
  #cx-car .cx-emi-row:last-of-type { border-bottom:none; }
  #cx-car .cx-emi-row strong { font-weight:700; }
  #cx-car .cx-emi-bar { display:flex; height:9px; border-radius:5px; overflow:hidden; margin:1rem 0 .5rem; background:rgba(255,255,255,.12); }
  #cx-car .cx-emi-bar-p { background:#fff; transition:width .25s ease; }
  #cx-car .cx-emi-bar-i { background:rgba(255,255,255,.42); transition:width .25s ease; }
  #cx-car .cx-emi-legend { display:flex; gap:1rem; font-size:.76rem; color:rgba(255,255,255,.9); }
  #cx-car .cx-emi-dot { width:9px; height:9px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:.35rem; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Car price (₹) <em data-out="price">8,00,000</em></span>
    <input type="number" id="cx-car-price" min="50000" max="10000000" step="10000" value="800000" inputmode="numeric">
    <input type="range"  id="cx-car-price-r" min="100000" max="5000000" step="10000" value="800000">
  </label>
  <label>
    <span>Down payment (₹) <em data-out="down">2,00,000</em></span>
    <input type="number" id="cx-car-down" min="0" max="10000000" step="10000" value="200000" inputmode="numeric">
    <input type="range"  id="cx-car-down-r" min="0" max="2000000" step="10000" value="200000">
  </label>
  <label>
    <span>Interest rate p.a. (%) <em data-out="rate">9.00%</em></span>
    <input type="number" id="cx-car-rate" min="6" max="20" step="0.25" value="9" inputmode="decimal">
    <input type="range"  id="cx-car-rate-r" min="6" max="18" step="0.25" value="9">
  </label>
  <label>
    <span>Loan tenure (years) <em data-out="tenure">5 yrs</em></span>
    <input type="number" id="cx-car-tenure" min="1" max="7" step="1" value="5" inputmode="numeric">
    <input type="range"  id="cx-car-tenure-r" min="1" max="7" step="1" value="5">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Monthly EMI</div>
  <div class="cx-emi-result-value" id="cx-car-emi">—</div>
  <div class="cx-emi-row"><span>Loan amount</span><strong id="cx-car-loan">—</strong></div>
  <div class="cx-emi-row"><span>Total payment</span><strong id="cx-car-total">—</strong></div>
  <div class="cx-emi-row"><span>Total interest</span><strong id="cx-car-interest">—</strong></div>
  <div class="cx-emi-row"><span>LTV ratio</span><strong id="cx-car-ltv">—</strong></div>
  <div class="cx-emi-bar">
    <div class="cx-emi-bar-p" id="cx-car-bar-p" style="width:60%"></div>
    <div class="cx-emi-bar-i" id="cx-car-bar-i" style="width:40%"></div>
  </div>
  <div class="cx-emi-legend">
    <span><span class="cx-emi-dot" style="background:#fff"></span>Principal <span id="cx-car-pct-p">60%</span></span>
    <span><span class="cx-emi-dot" style="background:rgba(255,255,255,.4)"></span>Interest <span id="cx-car-pct-i">40%</span></span>
  </div>
</div>
</div>

<script>
(function(){
  var fmtINR = function(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); };

  function compute(){
    var price   = parseFloat(document.getElementById('cx-car-price').value)  || 0;
    var down    = parseFloat(document.getElementById('cx-car-down').value)   || 0;
    var annRate = parseFloat(document.getElementById('cx-car-rate').value)   || 0;
    var years   = parseInt(document.getElementById('cx-car-tenure').value)   || 0;

    var loan = Math.max(0, price - down);
    var r    = annRate / 12 / 100;
    var n    = years * 12;
    var emi  = (loan > 0 && r > 0 && n > 0)
      ? loan * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1)
      : (n > 0 ? loan / n : 0);

    var total    = emi * n;
    var interest = total - loan;
    var ltv      = price > 0 ? (loan / price * 100) : 0;
    var pctP     = total > 0 ? Math.round((loan / total) * 100) : 0;
    var pctI     = 100 - pctP;

    document.getElementById('cx-car-emi').textContent      = fmtINR(emi);
    document.getElementById('cx-car-loan').textContent     = fmtINR(loan);
    document.getElementById('cx-car-total').textContent    = fmtINR(total);
    document.getElementById('cx-car-interest').textContent = fmtINR(interest);
    document.getElementById('cx-car-ltv').textContent      = ltv.toFixed(0) + '%';
    document.getElementById('cx-car-bar-p').style.width    = pctP + '%';
    document.getElementById('cx-car-bar-i').style.width    = pctI + '%';
    document.getElementById('cx-car-pct-p').textContent    = pctP + '%';
    document.getElementById('cx-car-pct-i').textContent    = pctI + '%';

    document.querySelector('#cx-car [data-out="price"]').textContent  = Math.round(price).toLocaleString('en-IN');
    document.querySelector('#cx-car [data-out="down"]').textContent   = Math.round(down).toLocaleString('en-IN');
    document.querySelector('#cx-car [data-out="rate"]').textContent   = annRate.toFixed(2) + '%';
    document.querySelector('#cx-car [data-out="tenure"]').textContent = years + ' yr' + (years !== 1 ? 's' : '');
  }

  function syncPair(nId, rId){
    var n = document.getElementById(nId), r = document.getElementById(rId);
    n.addEventListener('input', function(){ r.value = n.value; compute(); });
    r.addEventListener('input', function(){ n.value = r.value; compute(); });
  }
  syncPair('cx-car-price','cx-car-price-r'); syncPair('cx-car-down','cx-car-down-r');
  syncPair('cx-car-rate','cx-car-rate-r');   syncPair('cx-car-tenure','cx-car-tenure-r');
  compute();
})();
</script>
