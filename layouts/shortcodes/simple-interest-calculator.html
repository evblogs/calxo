<div class="cx-si-widget" id="cx-si">
<style>
  #cx-si.cx-si-widget {
    display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;
    background:linear-gradient(150deg,#fff 0%,#f8fafc 100%);
    border:1px solid #e2e8f0; border-radius:16px;
    padding:1.85rem; margin:1.5rem 0 2.5rem;
    box-shadow:0 4px 20px rgba(15,23,42,.04);
  }
  @media(max-width:760px){ #cx-si.cx-si-widget { grid-template-columns:1fr; gap:1.25rem; padding:1.25rem; } }
  #cx-si label { display:block; margin-bottom:1.1rem; }
  #cx-si label > span {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.88rem; font-weight:600; color:#0f172a; margin-bottom:.4rem;
  }
  #cx-si label > span em { color:#2563eb; font-weight:700; font-size:.98rem; font-style:normal; }
  #cx-si input[type="range"]  { width:100%; height:6px; accent-color:#2563eb; margin:.35rem 0 .25rem; }
  #cx-si input[type="number"] {
    width:100%; padding:.6rem .8rem; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.98rem; color:#0f172a; font-weight:600; box-sizing:border-box; background:#fff;
  }
  #cx-si input[type="number"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  #cx-si .cx-result {
    background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);
    color:#fff; border-radius:12px; padding:1.5rem;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; overflow:hidden;
  }
  #cx-si .cx-result::before {
    content:''; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:24px 24px; pointer-events:none;
  }
  #cx-si .cx-result > * { position:relative; }
  #cx-si .cx-result-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; opacity:.85; }
  #cx-si .cx-result-value { font-size:clamp(2rem,5vw,2.8rem); font-weight:800; letter-spacing:-1px; line-height:1.05; margin:.2rem 0 1rem; }
  #cx-si .cx-row { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid rgba(255,255,255,.18); font-size:.9rem; }
  #cx-si .cx-row:last-of-type { border-bottom:none; }
  #cx-si .cx-row strong { font-weight:700; }
</style>

<div id="cx-si-inputs">
  <label>
    <span>Principal (₹) <em id="cx-si-p-out">1,00,000</em></span>
    <input type="number" id="cx-si-p" min="1000" max="100000000" step="1000" value="100000" inputmode="numeric">
    <input type="range" id="cx-si-p-r" min="1000" max="10000000" step="1000" value="100000">
  </label>
  <label>
    <span>Annual interest rate (%) <em id="cx-si-r-out">8%</em></span>
    <input type="number" id="cx-si-r" min="0.1" max="50" step="0.1" value="8" inputmode="decimal">
    <input type="range" id="cx-si-r-r" min="0.1" max="50" step="0.1" value="8">
  </label>
  <label>
    <span>Time period (years) <em id="cx-si-t-out">3 years</em></span>
    <input type="number" id="cx-si-t" min="1" max="50" step="1" value="3" inputmode="numeric">
    <input type="range" id="cx-si-t-r" min="1" max="50" step="1" value="3">
  </label>
</div>

<div class="cx-result">
  <div class="cx-result-label">Total Interest Earned</div>
  <div class="cx-result-value" id="cx-si-interest">₹24,000</div>
  <div class="cx-row"><span>Principal</span><strong id="cx-si-principal">₹1,00,000</strong></div>
  <div class="cx-row"><span>Total amount</span><strong id="cx-si-total">₹1,24,000</strong></div>
  <div class="cx-row"><span>Effective annual return</span><strong id="cx-si-ear">8.0%</strong></div>
</div>
</div>

<script>
(function(){
  function fmtInr(v){ return '₹'+(v>=10000000?(v/10000000).toFixed(2)+' Cr':v>=100000?(v/100000).toFixed(2)+' L':Math.round(v).toLocaleString('en-IN')); }
  function syncPair(num,rng,outId,fmtFn){
    num.addEventListener('input',function(){ rng.value=num.value; document.getElementById(outId).textContent=fmtFn(+num.value); calc(); });
    rng.addEventListener('input',function(){ num.value=rng.value; document.getElementById(outId).textContent=fmtFn(+rng.value); calc(); });
  }
  syncPair(document.getElementById('cx-si-p'),document.getElementById('cx-si-p-r'),'cx-si-p-out',function(v){ return v>=100000?(v/100000).toFixed(1)+' L':v.toLocaleString('en-IN'); });
  syncPair(document.getElementById('cx-si-r'),document.getElementById('cx-si-r-r'),'cx-si-r-out',function(v){ return v+'%'; });
  syncPair(document.getElementById('cx-si-t'),document.getElementById('cx-si-t-r'),'cx-si-t-out',function(v){ return v+' year'+(v>1?'s':''); });

  function calc(){
    var P=+document.getElementById('cx-si-p').value;
    var R=+document.getElementById('cx-si-r').value;
    var T=+document.getElementById('cx-si-t').value;
    var SI=P*R*T/100;
    var total=P+SI;
    document.getElementById('cx-si-interest').textContent=fmtInr(SI);
    document.getElementById('cx-si-principal').textContent=fmtInr(P);
    document.getElementById('cx-si-total').textContent=fmtInr(total);
    document.getElementById('cx-si-ear').textContent=R.toFixed(1)+'%';
  }
  calc();
})();
</script>
