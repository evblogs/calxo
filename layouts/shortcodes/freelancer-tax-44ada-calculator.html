<div id="cx-44ada">
<style>
  #cx-44ada {
    background: linear-gradient(150deg,#fff 0%,#f8fafc 100%);
    border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 1.85rem; margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15,23,42,.04);
  }
  #cx-44ada .cx-44a-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media(max-width:760px){ #cx-44ada .cx-44a-inputs { grid-template-columns:1fr; } }
  #cx-44ada label { display:block; margin-bottom:1.1rem; }
  #cx-44ada label > span {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.88rem; font-weight:600; color:#0f172a; margin-bottom:.4rem;
  }
  #cx-44ada label > span em { color:#2563eb; font-weight:700; font-size:.98rem; font-style:normal; }
  #cx-44ada input[type="range"]  { width:100%; height:6px; accent-color:#2563eb; margin:.35rem 0 .25rem; }
  #cx-44ada input[type="number"] {
    width:100%; padding:.6rem .8rem; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.98rem; color:#0f172a; font-weight:600; box-sizing:border-box; background:#fff;
  }
  #cx-44ada input[type="number"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }

  #cx-44ada .cx-pres {
    background:#eff6ff; border:1px solid #bfdbfe; color:#1e3a8a;
    border-radius:10px; padding:.85rem 1.1rem; margin:.5rem 0 1.5rem;
    display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:.5rem;
    font-size:.92rem; font-weight:600;
  }
  #cx-44ada .cx-pres strong { font-size:1.05rem; font-weight:800; color:#1e40af; }

  #cx-44ada .cx-44a-results { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  @media(max-width:760px){ #cx-44ada .cx-44a-results { grid-template-columns:1fr; } }
  #cx-44ada .cx-regime-card {
    border-radius:12px; padding:1.4rem; color:#fff; position:relative; overflow:hidden;
  }
  #cx-44ada .cx-regime-card::before {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:24px 24px; pointer-events:none;
  }
  #cx-44ada .cx-regime-card > * { position:relative; }
  #cx-44ada .cx-card-old  { background: linear-gradient(135deg,#7c3aed 0%,#a855f7 100%); }
  #cx-44ada .cx-card-new  { background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%); }
  #cx-44ada .cx-regime-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; opacity:.85; }
  #cx-44ada .cx-regime-tax   { font-size:clamp(1.6rem,4vw,2.2rem); font-weight:800; letter-spacing:-1px; margin:.2rem 0 .9rem; }
  #cx-44ada .cx-regime-row   { display:flex; justify-content:space-between; padding:.45rem 0; border-bottom:1px solid rgba(255,255,255,.18); font-size:.88rem; }
  #cx-44ada .cx-regime-row:last-of-type { border-bottom:none; }
  #cx-44ada .cx-regime-row strong { font-weight:700; }
  #cx-44ada .cx-winner-badge {
    display:inline-block; background:rgba(255,255,255,.22); border-radius:99px;
    padding:.2rem .7rem; font-size:.72rem; font-weight:700; letter-spacing:.5px; margin-bottom:.6rem;
  }
  #cx-44ada .cx-verdict {
    margin-top:1.2rem; padding:1rem 1.2rem; border-radius:10px;
    background:#f0fdf4; border:1px solid #bbf7d0; color:#166534;
    font-size:.92rem; font-weight:600; text-align:center;
  }
  #cx-44ada .cx-verdict-old { background:#faf5ff; border-color:#e9d5ff; color:#5b21b6; }
  #cx-44ada .cx-verdict-tie { background:#eff6ff; border-color:#bfdbfe; color:#1e40af; }
  #cx-44ada .cx-warn { background:#fef3c7; color:#92400e; padding:.6rem .9rem; border-radius:8px; font-size:.8rem; margin-top:.8rem; line-height:1.5; }
</style>

<div class="cx-44a-inputs">
  <div>
    <label>
      <span>Annual gross professional receipts (₹) <em data-out="receipts">20,00,000</em></span>
      <input type="number" id="cx-44a-receipts" min="0" max="7500000" step="50000" value="2000000" inputmode="numeric">
      <input type="range"  id="cx-44a-receipts-r" min="0" max="7500000" step="50000" value="2000000">
    </label>
    <label>
      <span>80C investments (PPF/ELSS/LIC etc) <em data-out="c80">1,50,000</em></span>
      <input type="number" id="cx-44a-80c" min="0" max="150000" step="5000" value="150000" inputmode="numeric">
      <input type="range"  id="cx-44a-80c-r" min="0" max="150000" step="5000" value="150000">
    </label>
  </div>
  <div>
    <label>
      <span>80D health insurance premium <em data-out="d80">25,000</em></span>
      <input type="number" id="cx-44a-80d" min="0" max="100000" step="1000" value="25000" inputmode="numeric">
      <input type="range"  id="cx-44a-80d-r" min="0" max="100000" step="1000" value="25000">
    </label>
    <label>
      <span>NPS 80CCD(1B) (extra ₹50K) <em data-out="nps">50,000</em></span>
      <input type="number" id="cx-44a-nps" min="0" max="50000" step="5000" value="50000" inputmode="numeric">
      <input type="range"  id="cx-44a-nps-r" min="0" max="50000" step="5000" value="50000">
    </label>
  </div>
</div>

<div class="cx-pres">
  <span>Presumptive income (50% of gross)</span>
  <strong id="cx-44a-presumptive">₹10,00,000</strong>
</div>

<div class="cx-44a-results">
  <div class="cx-regime-card cx-card-old">
    <span class="cx-winner-badge" id="cx-44a-old-badge" style="display:none;">Better</span>
    <div class="cx-regime-label">Old Regime</div>
    <div class="cx-regime-tax" id="cx-44a-old-tax">—</div>
    <div class="cx-regime-row"><span>Presumptive income</span><strong id="cx-44a-old-pres">—</strong></div>
    <div class="cx-regime-row"><span>Less: deductions</span><strong id="cx-44a-old-ded">—</strong></div>
    <div class="cx-regime-row"><span>Taxable income</span><strong id="cx-44a-old-taxable">—</strong></div>
    <div class="cx-regime-row"><span>Tax before cess</span><strong id="cx-44a-old-tax-pre">—</strong></div>
    <div class="cx-regime-row"><span>87A rebate</span><strong id="cx-44a-old-rebate">—</strong></div>
    <div class="cx-regime-row"><span>+ 4% cess</span><strong id="cx-44a-old-cess">—</strong></div>
  </div>
  <div class="cx-regime-card cx-card-new">
    <span class="cx-winner-badge" id="cx-44a-new-badge" style="display:none;">Better</span>
    <div class="cx-regime-label">New Regime (FY 2025-26)</div>
    <div class="cx-regime-tax" id="cx-44a-new-tax">—</div>
    <div class="cx-regime-row"><span>Presumptive income</span><strong id="cx-44a-new-pres">—</strong></div>
    <div class="cx-regime-row"><span>Less: deductions</span><strong>None</strong></div>
    <div class="cx-regime-row"><span>Taxable income</span><strong id="cx-44a-new-taxable">—</strong></div>
    <div class="cx-regime-row"><span>Tax before cess</span><strong id="cx-44a-new-tax-pre">—</strong></div>
    <div class="cx-regime-row"><span>87A rebate</span><strong id="cx-44a-new-rebate">—</strong></div>
    <div class="cx-regime-row"><span>+ 4% cess</span><strong id="cx-44a-new-cess">—</strong></div>
  </div>
</div>

<div class="cx-verdict" id="cx-44a-verdict">—</div>
<div class="cx-warn" id="cx-44a-warn" style="display:none;"></div>

<script>
(function(){
  var fmtINR = function(n){
    if (!isFinite(n) || n < 0) n = 0;
    return '₹' + Math.round(n).toLocaleString('en-IN');
  };

  /* OLD regime — slabs unchanged */
  function oldRegimeTax(income){
    var tax = 0;
    if (income <= 250000)      tax = 0;
    else if (income <= 500000) tax = (income - 250000) * 0.05;
    else if (income <= 1000000) tax = 12500 + (income - 500000) * 0.20;
    else                        tax = 112500 + (income - 1000000) * 0.30;
    var rebate = 0;
    if (income <= 500000) { rebate = tax; tax = 0; }
    return { tax: tax, rebate: rebate };
  }

  /* NEW regime — Budget 2025 slabs (FY 2025-26 onwards) */
  function newRegimeTax(income){
    var tax = 0;
    if (income <= 400000)         tax = 0;
    else if (income <= 800000)    tax = (income - 400000) * 0.05;
    else if (income <= 1200000)   tax = 20000 + (income - 800000) * 0.10;
    else if (income <= 1600000)   tax = 60000 + (income - 1200000) * 0.15;
    else if (income <= 2000000)   tax = 120000 + (income - 1600000) * 0.20;
    else if (income <= 2400000)   tax = 200000 + (income - 2000000) * 0.25;
    else                          tax = 300000 + (income - 2400000) * 0.30;
    var rebate = 0;
    /* 87A rebate: zero tax up to ₹12L taxable income (Budget 2025) */
    if (income <= 1200000) { rebate = tax; tax = 0; }
    /* Marginal relief between 12L and ~12.75L: tax cannot exceed (income - 12L) */
    if (income > 1200000 && income <= 1275000) {
      var marginalCap = income - 1200000;
      if (tax > marginalCap) { rebate = tax - marginalCap; tax = marginalCap; }
    }
    return { tax: tax, rebate: rebate };
  }

  function compute(){
    var receipts = parseFloat(document.getElementById('cx-44a-receipts').value) || 0;
    var c80      = Math.min(parseFloat(document.getElementById('cx-44a-80c').value) || 0, 150000);
    var d80      = Math.min(parseFloat(document.getElementById('cx-44a-80d').value) || 0, 100000);
    var nps      = Math.min(parseFloat(document.getElementById('cx-44a-nps').value) || 0, 50000);

    var presumptive = receipts * 0.50;
    document.getElementById('cx-44a-presumptive').textContent = fmtINR(presumptive);

    /* OLD: deductions allowed */
    var oldDeductions = c80 + d80 + nps;
    var oldTaxable    = Math.max(0, presumptive - oldDeductions);
    var oldR          = oldRegimeTax(oldTaxable);
    var oldTax        = oldR.tax;
    var oldCess       = oldTax * 0.04;
    var oldFinal      = oldTax + oldCess;

    /* NEW: no chapter VI-A deductions for freelancers (no employer 80CCD(2)) */
    var newTaxable    = presumptive;
    var newR          = newRegimeTax(newTaxable);
    var newTax        = newR.tax;
    var newCess       = newTax * 0.04;
    var newFinal      = newTax + newCess;

    /* Render OLD card */
    document.getElementById('cx-44a-old-tax').textContent     = fmtINR(oldFinal);
    document.getElementById('cx-44a-old-pres').textContent    = fmtINR(presumptive);
    document.getElementById('cx-44a-old-ded').textContent     = fmtINR(oldDeductions);
    document.getElementById('cx-44a-old-taxable').textContent = fmtINR(oldTaxable);
    document.getElementById('cx-44a-old-tax-pre').textContent = fmtINR(oldTax + oldR.rebate);
    document.getElementById('cx-44a-old-rebate').textContent  = oldR.rebate > 0 ? '−' + fmtINR(oldR.rebate) : '₹0';
    document.getElementById('cx-44a-old-cess').textContent    = fmtINR(oldCess);

    /* Render NEW card */
    document.getElementById('cx-44a-new-tax').textContent     = fmtINR(newFinal);
    document.getElementById('cx-44a-new-pres').textContent    = fmtINR(presumptive);
    document.getElementById('cx-44a-new-taxable').textContent = fmtINR(newTaxable);
    document.getElementById('cx-44a-new-tax-pre').textContent = fmtINR(newTax + newR.rebate);
    document.getElementById('cx-44a-new-rebate').textContent  = newR.rebate > 0 ? '−' + fmtINR(newR.rebate) : '₹0';
    document.getElementById('cx-44a-new-cess').textContent    = fmtINR(newCess);

    /* Verdict + winner badge */
    var verdict = document.getElementById('cx-44a-verdict');
    var oldBadge = document.getElementById('cx-44a-old-badge');
    var newBadge = document.getElementById('cx-44a-new-badge');
    oldBadge.style.display = 'none';
    newBadge.style.display = 'none';
    verdict.classList.remove('cx-verdict-old', 'cx-verdict-tie');

    var diff = Math.round(Math.abs(oldFinal - newFinal));
    if (Math.abs(oldFinal - newFinal) < 100) {
      verdict.textContent = 'Both regimes are nearly identical for you (within ₹100). Pick the one you find simpler.';
      verdict.classList.add('cx-verdict-tie');
    } else if (newFinal < oldFinal) {
      verdict.textContent = 'New regime saves you ₹' + diff.toLocaleString('en-IN') + ' compared to the old regime.';
      newBadge.style.display = 'inline-block';
    } else {
      verdict.textContent = 'Old regime saves you ₹' + diff.toLocaleString('en-IN') + ' compared to the new regime.';
      oldBadge.style.display = 'inline-block';
      verdict.classList.add('cx-verdict-old');
    }

    /* Threshold warnings */
    var warn = document.getElementById('cx-44a-warn');
    if (receipts > 7500000) {
      warn.style.display = 'block';
      warn.innerHTML = '<strong>Above ₹75L threshold.</strong> Section 44ADA is not available beyond ₹75L gross receipts. You must maintain regular books of accounts and claim actual expenses under Section 44AB tax audit.';
    } else if (receipts > 5000000) {
      warn.style.display = 'block';
      warn.innerHTML = '<strong>Above ₹50L threshold.</strong> The expanded ₹75L limit applies only if your cash receipts are less than 5% of total gross receipts. Otherwise, your 44ADA limit stays at ₹50L.';
    } else {
      warn.style.display = 'none';
    }

    document.querySelector('#cx-44ada [data-out="receipts"]').textContent = Math.round(receipts).toLocaleString('en-IN');
    document.querySelector('#cx-44ada [data-out="c80"]').textContent      = Math.round(c80).toLocaleString('en-IN');
    document.querySelector('#cx-44ada [data-out="d80"]').textContent      = Math.round(d80).toLocaleString('en-IN');
    document.querySelector('#cx-44ada [data-out="nps"]').textContent      = Math.round(nps).toLocaleString('en-IN');
  }

  function syncPair(nId, rId){
    var n = document.getElementById(nId), r = document.getElementById(rId);
    n.addEventListener('input', function(){
      var v = parseFloat(n.value);
      if (!isNaN(v)) {
        if (v < parseFloat(r.min)) r.value = r.min;
        else if (v > parseFloat(r.max)) r.value = r.max;
        else r.value = v;
      }
      compute();
    });
    r.addEventListener('input', function(){ n.value = r.value; compute(); });
  }
  syncPair('cx-44a-receipts','cx-44a-receipts-r');
  syncPair('cx-44a-80c','cx-44a-80c-r');
  syncPair('cx-44a-80d','cx-44a-80d-r');
  syncPair('cx-44a-nps','cx-44a-nps-r');

  compute();
})();
</script>
</div>
