<div class="cx-emi-widget" id="cx-ups">
<style>
  #cx-ups.cx-emi-widget {
    display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;
    background:linear-gradient(150deg,#fff 0%,#f8fafc 100%);
    border:1px solid #e2e8f0; border-radius:16px;
    padding:1.85rem; margin:1.5rem 0 2.5rem;
    box-shadow:0 4px 20px rgba(15,23,42,.04);
  }
  @media(max-width:760px){ #cx-ups.cx-emi-widget { grid-template-columns:1fr; gap:1.25rem; padding:1.25rem; } }
  #cx-ups label { display:block; margin-bottom:1.1rem; }
  #cx-ups label > span {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.88rem; font-weight:600; color:#0f172a; margin-bottom:.4rem;
  }
  #cx-ups label > span em { color:#2563eb; font-weight:700; font-size:.98rem; font-style:normal; }
  #cx-ups input[type="range"]  { width:100%; height:6px; accent-color:#2563eb; margin:.35rem 0 .25rem; }
  #cx-ups input[type="number"] {
    width:100%; padding:.6rem .8rem; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.98rem; color:#0f172a; font-weight:600; box-sizing:border-box; background:#fff;
  }
  #cx-ups input[type="number"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  #cx-ups .cx-emi-result {
    background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%);
    color:#fff; border-radius:12px; padding:1.5rem;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; overflow:hidden;
  }
  #cx-ups .cx-emi-result::before {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:24px 24px; pointer-events:none;
  }
  #cx-ups .cx-emi-result > * { position:relative; }
  #cx-ups .cx-emi-result-label  { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; opacity:.85; }
  #cx-ups .cx-emi-result-value  { font-size:clamp(1.85rem,5vw,2.4rem); font-weight:800; letter-spacing:-1px; line-height:1.05; margin:.25rem 0 1.1rem; }
  #cx-ups .cx-emi-row { display:flex; justify-content:space-between; padding:.55rem 0; border-bottom:1px solid rgba(255,255,255,.18); font-size:.9rem; }
  #cx-ups .cx-emi-row:last-of-type { border-bottom:none; }
  #cx-ups .cx-emi-row strong { font-weight:700; }
  #cx-ups .cx-note { font-size:.75rem; opacity:.85; margin-top:.75rem; line-height:1.5; }
  #cx-ups .cx-warn { background:#fef3c7; color:#92400e; padding:.5rem .75rem; border-radius:6px; font-size:.78rem; margin-top:.6rem; line-height:1.5; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Years of qualifying service <em data-out="years">30 yrs</em></span>
    <input type="number" id="cx-ups-years" min="0" max="40" step="1" value="30" inputmode="numeric">
    <input type="range"  id="cx-ups-years-r" min="0" max="40" step="1" value="30">
  </label>
  <label>
    <span>Last drawn basic pay (₹/month) <em data-out="basic">75,000</em></span>
    <input type="number" id="cx-ups-basic" min="18000" max="500000" step="1000" value="75000" inputmode="numeric">
    <input type="range"  id="cx-ups-basic-r" min="18000" max="250000" step="1000" value="75000">
  </label>
  <label>
    <span>Current DA (% of basic) <em data-out="da">53%</em></span>
    <input type="number" id="cx-ups-da" min="0" max="200" step="1" value="53" inputmode="numeric">
    <input type="range"  id="cx-ups-da-r" min="0" max="200" step="1" value="53">
  </label>
  <label>
    <span>Avg basic — last 12 months (₹/month) <em data-out="avg">75,000</em></span>
    <input type="number" id="cx-ups-avg" min="18000" max="500000" step="1000" value="75000" inputmode="numeric">
    <input type="range"  id="cx-ups-avg-r" min="18000" max="250000" step="1000" value="75000">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Monthly UPS Pension</div>
  <div class="cx-emi-result-value" id="cx-ups-pension">—</div>
  <div class="cx-emi-row"><span>Eligibility</span><strong id="cx-ups-eligible">—</strong></div>
  <div class="cx-emi-row"><span>Pension formula applied</span><strong id="cx-ups-formula">—</strong></div>
  <div class="cx-emi-row"><span>Family pension (60%)</span><strong id="cx-ups-family">—</strong></div>
  <div class="cx-emi-row"><span>Lump sum at retirement</span><strong id="cx-ups-lumpsum">—</strong></div>
  <div class="cx-emi-row"><span>Pension + DR (today)</span><strong id="cx-ups-with-dr">—</strong></div>
  <div class="cx-note">UPS pension is paid <em>in addition</em> to gratuity. Dearness Relief (DR) is applied at the same rate as DA, revised twice a year.</div>
  <div class="cx-warn" id="cx-ups-warn" style="display:none;"></div>
</div>

<script>
(function(){
  var fmtINR = function(n){
    if (!isFinite(n) || n < 0) n = 0;
    return '₹' + Math.round(n).toLocaleString('en-IN');
  };

  function compute(){
    var years = parseFloat(document.getElementById('cx-ups-years').value) || 0;
    var basic = parseFloat(document.getElementById('cx-ups-basic').value) || 0;
    var da    = parseFloat(document.getElementById('cx-ups-da').value)    || 0;
    var avg   = parseFloat(document.getElementById('cx-ups-avg').value)   || 0;

    var pensionEl   = document.getElementById('cx-ups-pension');
    var eligibleEl  = document.getElementById('cx-ups-eligible');
    var formulaEl   = document.getElementById('cx-ups-formula');
    var familyEl    = document.getElementById('cx-ups-family');
    var lumpsumEl   = document.getElementById('cx-ups-lumpsum');
    var withDrEl    = document.getElementById('cx-ups-with-dr');
    var warnEl      = document.getElementById('cx-ups-warn');

    var pension = 0, eligibilityText = '', formulaText = '';
    var minFloor = 10000; // ₹10,000/month minimum for ≥10 yrs

    if (years < 10) {
      pension = 0;
      eligibilityText = 'Not eligible';
      formulaText = '< 10 yrs service';
      warnEl.style.display = 'block';
      warnEl.textContent = 'Minimum 10 years of qualifying service required for UPS pension. With less than 10 years, only NPS-style refund of own contributions + employer share applies.';
    } else if (years >= 25) {
      pension = 0.5 * avg;
      if (pension < minFloor) pension = minFloor;
      eligibilityText = 'Full pension';
      formulaText = '50% of avg basic';
      warnEl.style.display = 'none';
    } else {
      // 10 ≤ years < 25 — proportionate
      pension = (years / 25) * 0.5 * avg;
      if (pension < minFloor) pension = minFloor;
      eligibilityText = 'Proportionate';
      formulaText = '(' + years + '/25) × 50% × avg basic';
      warnEl.style.display = 'none';
    }

    // Family pension = 60% of pension (no min floor for family pension)
    var familyPension = (years < 10) ? 0 : pension * 0.6;

    // Lump sum: 10% of (basic + DA) × number of completed 6-month periods
    var basicPlusDA = basic * (1 + da/100);
    var halfYearPeriods = Math.floor(years * 2);
    var lumpSum = 0.10 * basicPlusDA * halfYearPeriods;

    // Pension + DR (current DA% applied to pension)
    var pensionWithDR = pension * (1 + da/100);

    pensionEl.textContent  = fmtINR(pension);
    eligibleEl.textContent = eligibilityText;
    formulaEl.textContent  = formulaText;
    familyEl.textContent   = fmtINR(familyPension);
    lumpsumEl.textContent  = fmtINR(lumpSum);
    withDrEl.textContent   = fmtINR(pensionWithDR);

    document.querySelector('#cx-ups [data-out="years"]').textContent = years + ' yr' + (years !== 1 ? 's' : '');
    document.querySelector('#cx-ups [data-out="basic"]').textContent = Math.round(basic).toLocaleString('en-IN');
    document.querySelector('#cx-ups [data-out="da"]').textContent    = da + '%';
    document.querySelector('#cx-ups [data-out="avg"]').textContent   = Math.round(avg).toLocaleString('en-IN');
  }

  function syncPair(nId, rId){
    var n = document.getElementById(nId), r = document.getElementById(rId);
    n.addEventListener('input', function(){
      // Clamp the range slider if the typed value exceeds slider max
      var v = parseFloat(n.value);
      if (!isNaN(v)) {
        if (v < parseFloat(r.min)) r.value = r.min;
        else if (v > parseFloat(r.max)) r.value = r.max;
        else r.value = v;
      }
      compute();
    });
    r.addEventListener('input', function(){ n.value = r.value; compute(); });
  }
  syncPair('cx-ups-years','cx-ups-years-r');
  syncPair('cx-ups-basic','cx-ups-basic-r');
  syncPair('cx-ups-da','cx-ups-da-r');
  syncPair('cx-ups-avg','cx-ups-avg-r');

  // Auto-fill avg basic when "last drawn basic" changes (most users don't have separate avg)
  document.getElementById('cx-ups-basic').addEventListener('change', function(){
    var b = document.getElementById('cx-ups-basic').value;
    var avgInput = document.getElementById('cx-ups-avg');
    if (avgInput.dataset.touched !== '1') {
      avgInput.value = b;
      var avgRange = document.getElementById('cx-ups-avg-r');
      avgRange.value = Math.min(Math.max(b, avgRange.min), avgRange.max);
    }
  });
  document.getElementById('cx-ups-avg').addEventListener('input', function(){
    document.getElementById('cx-ups-avg').dataset.touched = '1';
  });

  compute();
})();
</script>
</div>
