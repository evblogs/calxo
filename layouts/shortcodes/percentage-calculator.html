<div class="cx-pct-widget" id="cx-pct">
<style>
  #cx-pct {
    margin: 1.5rem 0 2.5rem;
    display: flex; flex-direction: column; gap: .75rem;
  }
  #cx-pct .cx-pct-row {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 1.1rem 1.4rem;
    display: flex; align-items: center; gap: .75rem;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(15,23,42,.04);
  }
  #cx-pct .cx-pct-sentence {
    display: flex; align-items: center; gap: .5rem;
    flex-wrap: wrap; flex: 1; min-width: 0;
    font-size: 1rem; color: #334155; font-weight: 500;
  }
  #cx-pct .cx-pct-sentence input[type="number"] {
    width: 90px; padding: .45rem .65rem;
    background: #fff; border: 1.5px solid #cbd5e1; border-radius: 7px;
    font-size: .98rem; font-weight: 700; color: #0f172a;
    text-align: center; outline: none;
    box-sizing: border-box;
  }
  #cx-pct .cx-pct-sentence input[type="number"]:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  #cx-pct .cx-pct-sentence .cx-pct-unit {
    color: #64748b; font-size: .92rem;
  }
  #cx-pct .cx-pct-btn {
    background: #2563eb; color: #fff;
    border: none; border-radius: 8px;
    padding: .5rem 1.1rem; font-size: .88rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; letter-spacing: .3px;
    transition: background .15s;
  }
  #cx-pct .cx-pct-btn:hover { background: #1d4ed8; }
  #cx-pct .cx-pct-result-wrap {
    display: flex; align-items: center; gap: .5rem;
  }
  #cx-pct .cx-pct-res-input {
    width: 110px; padding: .45rem .65rem;
    background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 7px;
    font-size: .98rem; font-weight: 700; color: #1e3a8a;
    text-align: center; box-sizing: border-box;
    pointer-events: none;
  }
  #cx-pct .cx-pct-res-unit {
    color: #64748b; font-size: .92rem; font-weight: 600;
  }
  #cx-pct .cx-pct-copy {
    background: #e2e8f0; border: none; border-radius: 7px;
    color: #64748b; cursor: pointer; padding: .45rem .55rem;
    font-size: .85rem; transition: background .15s, color .15s;
    display: flex; align-items: center;
  }
  #cx-pct .cx-pct-copy:hover { background: #cbd5e1; color: #1e293b; }
  #cx-pct .cx-pct-copy.copied { background: #16a34a; color: #fff; }
  @media(max-width:640px){
    #cx-pct .cx-pct-row { padding: .9rem 1rem; gap: .6rem; }
    #cx-pct .cx-pct-sentence input[type="number"] { width: 75px; }
    #cx-pct .cx-pct-res-input { width: 90px; }
    #cx-pct .cx-pct-btn { padding: .45rem .8rem; }
  }
</style>

<!-- Row 1: What is X% of Y -->
<div class="cx-pct-row">
  <div class="cx-pct-sentence">
    <span>What is</span>
    <input type="number" id="cx-p0-pct" value="15" min="0" oninput="cxP0()">
    <span class="cx-pct-unit">%</span>
    <span>of</span>
    <input type="number" id="cx-p0-num" value="2500" oninput="cxP0()">
    <span>?</span>
  </div>
  <button class="cx-pct-btn" onclick="cxP0()">Calculate</button>
  <div class="cx-pct-result-wrap">
    <input class="cx-pct-res-input" id="cx-p0-res" value="375" readonly>
    <button class="cx-pct-copy" onclick="cxCopy('cx-p0-res',this)" title="Copy">&#9113;</button>
  </div>
</div>

<!-- Row 2: X is what % of Y -->
<div class="cx-pct-row">
  <div class="cx-pct-sentence">
    <input type="number" id="cx-p1-x" value="375" min="0" oninput="cxP1()">
    <span>is what</span>
    <span class="cx-pct-unit">%</span>
    <span>of</span>
    <input type="number" id="cx-p1-y" value="2500" oninput="cxP1()">
    <span>?</span>
  </div>
  <button class="cx-pct-btn" onclick="cxP1()">Calculate</button>
  <div class="cx-pct-result-wrap">
    <input class="cx-pct-res-input" id="cx-p1-res" value="15" readonly>
    <span class="cx-pct-res-unit">%</span>
    <button class="cx-pct-copy" onclick="cxCopy('cx-p1-res',this)" title="Copy">&#9113;</button>
  </div>
</div>

<!-- Row 3: % Change from A to B -->
<div class="cx-pct-row">
  <div class="cx-pct-sentence">
    <span>What is the</span>
    <span class="cx-pct-unit">%</span>
    <span>change from</span>
    <input type="number" id="cx-p2-old" value="800" oninput="cxP2()">
    <span>to</span>
    <input type="number" id="cx-p2-new" value="950" oninput="cxP2()">
    <span>?</span>
  </div>
  <button class="cx-pct-btn" onclick="cxP2()">Calculate</button>
  <div class="cx-pct-result-wrap">
    <input class="cx-pct-res-input" id="cx-p2-res" value="+18.75" readonly>
    <span class="cx-pct-res-unit">%</span>
    <button class="cx-pct-copy" onclick="cxCopy('cx-p2-res',this)" title="Copy">&#9113;</button>
  </div>
</div>

<!-- Row 4: Increase / Decrease by % -->
<div class="cx-pct-row">
  <div class="cx-pct-sentence">
    <span>What is the</span>
    <span class="cx-pct-unit">%</span>
    <span>increase / decrease of</span>
    <input type="number" id="cx-p3-base" value="5000" oninput="cxP3()">
    <span>by</span>
    <input type="number" id="cx-p3-pct" value="20" oninput="cxP3()">
    <span class="cx-pct-unit">%</span>
    <span>?</span>
  </div>
  <button class="cx-pct-btn" onclick="cxP3()">Calculate</button>
  <div class="cx-pct-result-wrap" style="flex-direction:column;align-items:flex-start;gap:.3rem;">
    <div style="display:flex;align-items:center;gap:.4rem;">
      <span style="color:#4ade80;font-size:.78rem;font-weight:700;">▲</span>
      <input class="cx-pct-res-input" id="cx-p3-inc" value="6,000" readonly style="width:100px;">
      <button class="cx-pct-copy" onclick="cxCopy('cx-p3-inc',this)" title="Copy">&#9113;</button>
    </div>
    <div style="display:flex;align-items:center;gap:.4rem;">
      <span style="color:#f87171;font-size:.78rem;font-weight:700;">▼</span>
      <input class="cx-pct-res-input" id="cx-p3-dec" value="4,000" readonly style="width:100px;">
      <button class="cx-pct-copy" onclick="cxCopy('cx-p3-dec',this)" title="Copy">&#9113;</button>
    </div>
  </div>
</div>

<script>
(function(){
  function fmt(n){return Number(n.toFixed(4)).toLocaleString('en-IN',{maximumFractionDigits:4});}

  window.cxP0 = function(){
    var p=parseFloat(document.getElementById('cx-p0-pct').value)||0;
    var n=parseFloat(document.getElementById('cx-p0-num').value)||0;
    document.getElementById('cx-p0-res').value=fmt(p/100*n);
  };
  window.cxP1 = function(){
    var x=parseFloat(document.getElementById('cx-p1-x').value)||0;
    var y=parseFloat(document.getElementById('cx-p1-y').value)||0;
    document.getElementById('cx-p1-res').value=y?fmt(x/y*100):'0';
  };
  window.cxP2 = function(){
    var o=parseFloat(document.getElementById('cx-p2-old').value)||0;
    var n=parseFloat(document.getElementById('cx-p2-new').value)||0;
    var r=o?(n-o)/o*100:0;
    document.getElementById('cx-p2-res').value=(r>=0?'+':'')+fmt(r);
  };
  window.cxP3 = function(){
    var b=parseFloat(document.getElementById('cx-p3-base').value)||0;
    var p=parseFloat(document.getElementById('cx-p3-pct').value)||0;
    var amt=b*p/100;
    document.getElementById('cx-p3-inc').value=fmt(b+amt);
    document.getElementById('cx-p3-dec').value=fmt(b-amt);
  };
  window.cxCopy = function(id,btn){
    var val=document.getElementById(id).value;
    navigator.clipboard.writeText(val).then(function(){
      btn.classList.add('copied');
      btn.textContent='✓';
      setTimeout(function(){ btn.classList.remove('copied'); btn.innerHTML='&#9113;'; },1500);
    });
  };
})();
</script>
</div>
