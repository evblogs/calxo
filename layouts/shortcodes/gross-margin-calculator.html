<div class="cx-emi-widget" id="cx-gm">
<style>
  #cx-gm.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04); }
  @media (max-width: 760px) { #cx-gm.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-gm label { display: block; margin-bottom: 1.15rem; }
  #cx-gm label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-gm label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-gm input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-gm input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-gm input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-gm .cx-emi-result { border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; color: #fff; }
  #cx-gm .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-gm .cx-emi-result > * { position: relative; }
  #cx-gm .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-gm .cx-emi-result-value { font-size: clamp(2rem,6vw,3rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-gm .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-gm .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-gm .cx-emi-row strong { font-weight: 700; }
  #cx-gm .cx-bar { display: flex; height: 9px; border-radius: 5px; overflow: hidden; margin: 1rem 0 .5rem; background: rgba(255,255,255,.12); }
  #cx-gm .cx-bar-p { background: #fff; transition: width .25s ease; }
  #cx-gm .cx-verdict { background: rgba(255,255,255,.15); border-radius: 8px; padding: .45rem .7rem; margin-top: .4rem; font-size: .82rem; font-weight: 700; text-align: center; }
</style>
<div class="cx-emi-inputs">
  <label><span>Revenue (₹) <em data-out="rev">₹10,00,000</em></span>
    <input type="number" id="cx-gm-rev" min="1" max="1000000000" step="10000" value="1000000" inputmode="numeric">
    <input type="range" id="cx-gm-rev-r" min="10000" max="10000000" step="10000" value="1000000"></label>
  <label><span>Cost of goods sold / COGS (₹) <em data-out="cogs">₹3,00,000</em></span>
    <input type="number" id="cx-gm-cogs" min="0" max="1000000000" step="10000" value="300000" inputmode="numeric">
    <input type="range" id="cx-gm-cogs-r" min="0" max="10000000" step="10000" value="300000"></label>
</div>
<div class="cx-emi-result" id="cx-gm-panel" style="background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%)">
  <div class="cx-emi-result-label">Gross Margin</div>
  <div class="cx-emi-result-value" id="cx-gm-pct">0%</div>
  <div class="cx-emi-row"><span>Revenue</span><strong id="cx-gm-rev-out">₹0</strong></div>
  <div class="cx-emi-row"><span>COGS</span><strong id="cx-gm-cogs-out">₹0</strong></div>
  <div class="cx-emi-row"><span>Gross profit</span><strong id="cx-gm-gp">₹0</strong></div>
  <div class="cx-bar"><div class="cx-bar-p" id="cx-gm-bar" style="width:70%"></div></div>
  <div class="cx-verdict" id="cx-gm-verdict">—</div>
</div>
</div>
<script>
(function(){
  var fmtINR=function(n){return '₹'+Math.round(n).toLocaleString('en-IN');};
  var rev=document.getElementById('cx-gm-rev'),revR=document.getElementById('cx-gm-rev-r');
  var cogs=document.getElementById('cx-gm-cogs'),cogsR=document.getElementById('cx-gm-cogs-r');
  var panel=document.getElementById('cx-gm-panel');
  function compute(){
    var R=parseFloat(rev.value)||1,C=parseFloat(cogs.value)||0;
    var gp=R-C,pct=R>0?(gp/R)*100:0;
    var bg,verdict;
    if(pct>=70){bg='linear-gradient(135deg,#166534 0%,#16a34a 60%,#4ade80 100%)';verdict='Excellent (70%+) — typical SaaS / software margin';}
    else if(pct>=50){bg='linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%)';verdict='Healthy (50-70%) — good for services / agencies';}
    else if(pct>=30){bg='linear-gradient(135deg,#78350f 0%,#b45309 50%,#d97706 100%)';verdict='Moderate (30-50%) — typical product business';}
    else{bg='linear-gradient(135deg,#7f1d1d 0%,#dc2626 55%,#f97316 100%)';verdict='Low (<30%) — review cost structure';}
    panel.style.background=bg;
    document.getElementById('cx-gm-pct').textContent=pct.toFixed(1)+'%';
    document.getElementById('cx-gm-rev-out').textContent=fmtINR(R);
    document.getElementById('cx-gm-cogs-out').textContent=fmtINR(C);
    document.getElementById('cx-gm-gp').textContent=fmtINR(gp);
    document.getElementById('cx-gm-bar').style.width=Math.max(0,Math.min(100,pct))+'%';
    document.getElementById('cx-gm-verdict').textContent=verdict;
    document.querySelector('#cx-gm [data-out="rev"]').textContent=fmtINR(R);
    document.querySelector('#cx-gm [data-out="cogs"]').textContent=fmtINR(C);
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(rev,revR);syncPair(cogs,cogsR);
  compute();
})();
</script>
