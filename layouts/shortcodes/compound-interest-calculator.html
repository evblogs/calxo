<div class="cx-emi-widget" id="cx-ci">
<style>
  #cx-ci.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15, 23, 42, .04); }
  @media (max-width: 760px) { #cx-ci.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-ci label { display: block; margin-bottom: 1.15rem; }
  #cx-ci label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-ci label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-ci input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-ci input[type="number"], #cx-ci select { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-ci input[type="number"]:focus, #cx-ci select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
  #cx-ci .cx-emi-result { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-ci .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-ci .cx-emi-result > * { position: relative; }
  #cx-ci .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-ci .cx-emi-result-value { font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-ci .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255, 255, 255, .18); font-size: .9rem; }
  #cx-ci .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-ci .cx-emi-row strong { font-weight: 700; }
  #cx-ci .cx-emi-bar { display: flex; height: 9px; border-radius: 5px; overflow: hidden; margin: 1rem 0 .5rem; background: rgba(255, 255, 255, .12); }
  #cx-ci .cx-emi-bar-p { background: #ffffff; transition: width .25s ease; }
  #cx-ci .cx-emi-bar-i { background: rgba(255, 255, 255, .42); transition: width .25s ease; }
  #cx-ci .cx-emi-legend { display: flex; gap: 1rem; font-size: .76rem; color: rgba(255, 255, 255, .9); }
  #cx-ci .cx-emi-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: .35rem; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Principal (₹) <em data-out="amt">1,00,000</em></span>
    <input type="number" id="cx-ci-amt" min="100" max="100000000" step="500" value="100000" inputmode="numeric">
    <input type="range" id="cx-ci-amt-r" min="1000" max="5000000" step="1000" value="100000">
  </label>
  <label>
    <span>Annual interest rate (%) <em data-out="rate">10.00%</em></span>
    <input type="number" id="cx-ci-rate" min="0" max="50" step="0.25" value="10" inputmode="decimal">
    <input type="range" id="cx-ci-rate-r" min="0" max="30" step="0.25" value="10">
  </label>
  <label>
    <span>Time period (years) <em data-out="years">5 yrs</em></span>
    <input type="number" id="cx-ci-years" min="0.25" max="50" step="0.25" value="5" inputmode="decimal">
    <input type="range" id="cx-ci-years-r" min="0.25" max="30" step="0.25" value="5">
  </label>
  <label>
    <span>Compounding frequency</span>
    <select id="cx-ci-comp">
      <option value="1">Annually</option>
      <option value="2">Half-yearly</option>
      <option value="4" selected>Quarterly</option>
      <option value="12">Monthly</option>
      <option value="365">Daily</option>
      <option value="0">Simple interest (no compounding)</option>
    </select>
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Maturity amount</div>
  <div class="cx-emi-result-value" id="cx-ci-fv">₹1,63,862</div>
  <div class="cx-emi-row"><span>Principal</span> <strong id="cx-ci-principal">₹1,00,000</strong></div>
  <div class="cx-emi-row"><span>Interest earned</span> <strong id="cx-ci-interest">₹63,862</strong></div>
  <div class="cx-emi-row"><span>Effective annual yield</span> <strong id="cx-ci-yield">10.38%</strong></div>
  <div class="cx-emi-bar">
    <div class="cx-emi-bar-p" id="cx-ci-bar-p" style="width:61%"></div>
    <div class="cx-emi-bar-i" id="cx-ci-bar-i" style="width:39%"></div>
  </div>
  <div class="cx-emi-legend">
    <span><span class="cx-emi-dot" style="background:#fff"></span>Principal <span id="cx-ci-pct-p">61%</span></span>
    <span><span class="cx-emi-dot" style="background:rgba(255,255,255,.4)"></span>Interest <span id="cx-ci-pct-i">39%</span></span>
  </div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtRaw = function (n) { return Math.round(n).toLocaleString('en-IN'); };

  var amt = document.getElementById('cx-ci-amt');
  var amtR = document.getElementById('cx-ci-amt-r');
  var rate = document.getElementById('cx-ci-rate');
  var rateR = document.getElementById('cx-ci-rate-r');
  var yrs = document.getElementById('cx-ci-years');
  var yrsR = document.getElementById('cx-ci-years-r');
  var comp = document.getElementById('cx-ci-comp');

  function compute() {
    var P = parseFloat(amt.value) || 0;
    var aRate = parseFloat(rate.value) || 0;
    var t = parseFloat(yrs.value) || 0;
    var n = parseInt(comp.value, 10);
    var r = aRate / 100;

    var fv;
    if (n === 0) {
      fv = P + (P * r * t);
    } else {
      fv = P * Math.pow(1 + r / n, n * t);
    }
    var interest = fv - P;
    var yieldPct = t > 0 && P > 0 ? (Math.pow(fv / P, 1 / t) - 1) * 100 : 0;
    var pctP = fv > 0 ? Math.round((P / fv) * 100) : 0;
    var pctI = 100 - pctP;

    document.getElementById('cx-ci-fv').textContent = fmtINR(fv);
    document.getElementById('cx-ci-principal').textContent = fmtINR(P);
    document.getElementById('cx-ci-interest').textContent = fmtINR(interest);
    document.getElementById('cx-ci-yield').textContent = yieldPct.toFixed(2) + '%';
    document.getElementById('cx-ci-bar-p').style.width = pctP + '%';
    document.getElementById('cx-ci-bar-i').style.width = pctI + '%';
    document.getElementById('cx-ci-pct-p').textContent = pctP + '%';
    document.getElementById('cx-ci-pct-i').textContent = pctI + '%';

    document.querySelector('#cx-ci [data-out="amt"]').textContent = fmtRaw(P);
    document.querySelector('#cx-ci [data-out="rate"]').textContent = aRate.toFixed(2) + '%';
    document.querySelector('#cx-ci [data-out="years"]').textContent = t + ' yr' + (t !== 1 ? 's' : '');
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }
  syncPair(amt, amtR); syncPair(rate, rateR); syncPair(yrs, yrsR);
  comp.addEventListener('change', compute);

  compute();
})();
</script>
