<div class="cx-emi-widget" id="cx-bep">
<style>
  #cx-bep.cx-emi-widget { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04); }
  @media (max-width: 760px) { #cx-bep.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-bep label { display: block; margin-bottom: 1.15rem; }
  #cx-bep label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-bep label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-bep input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-bep input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-bep input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-bep .cx-emi-result { background: linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-bep .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-bep .cx-emi-result > * { position: relative; }
  #cx-bep .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-bep .cx-emi-result-value { font-size: clamp(1.85rem,5vw,2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-bep .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-bep .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-bep .cx-emi-row strong { font-weight: 700; }
</style>
<div class="cx-emi-inputs">
  <label><span>Fixed costs / month (₹) <em data-out="fixed">₹2,00,000</em></span>
    <input type="number" id="cx-bep-fixed" min="0" max="1000000000" step="10000" value="200000" inputmode="numeric">
    <input type="range" id="cx-bep-fixed-r" min="0" max="2000000" step="10000" value="200000"></label>
  <label><span>Selling price per unit (₹) <em data-out="price">₹2,000</em></span>
    <input type="number" id="cx-bep-price" min="1" max="10000000" step="100" value="2000" inputmode="numeric">
    <input type="range" id="cx-bep-price-r" min="100" max="100000" step="100" value="2000"></label>
  <label><span>Variable cost per unit (₹) <em data-out="vc">₹600</em></span>
    <input type="number" id="cx-bep-vc" min="0" max="10000000" step="50" value="600" inputmode="numeric">
    <input type="range" id="cx-bep-vc-r" min="0" max="50000" step="50" value="600"></label>
</div>
<div class="cx-emi-result">
  <div class="cx-emi-result-label">Break-even units / month</div>
  <div class="cx-emi-result-value" id="cx-bep-units">0</div>
  <div class="cx-emi-row"><span>Break-even revenue</span><strong id="cx-bep-rev">₹0</strong></div>
  <div class="cx-emi-row"><span>Contribution margin</span><strong id="cx-bep-cm">₹0 (0%)</strong></div>
  <div class="cx-emi-row"><span>Profit at 2× break-even</span><strong id="cx-bep-2x">₹0</strong></div>
</div>
</div>
<script>
(function(){
  var fmtINR=function(n){return '₹'+Math.round(n).toLocaleString('en-IN');};
  var fixed=document.getElementById('cx-bep-fixed'),fixedR=document.getElementById('cx-bep-fixed-r');
  var price=document.getElementById('cx-bep-price'),priceR=document.getElementById('cx-bep-price-r');
  var vc=document.getElementById('cx-bep-vc'),vcR=document.getElementById('cx-bep-vc-r');
  function compute(){
    var F=parseFloat(fixed.value)||0,P=parseFloat(price.value)||1,V=parseFloat(vc.value)||0;
    var cm=P-V,cmPct=P>0?(cm/P)*100:0;
    var bepUnits=cm>0?Math.ceil(F/cm):Infinity;
    var bepRev=bepUnits===Infinity?0:bepUnits*P;
    var profit2x=cm>0?(bepUnits*2*cm-F):0;
    document.getElementById('cx-bep-units').textContent=bepUnits===Infinity?'N/A':bepUnits.toLocaleString('en-IN');
    document.getElementById('cx-bep-rev').textContent=bepUnits===Infinity?'N/A':fmtINR(bepRev);
    document.getElementById('cx-bep-cm').textContent=fmtINR(cm)+' ('+cmPct.toFixed(1)+'%)';
    document.getElementById('cx-bep-2x').textContent=fmtINR(profit2x);
    document.querySelector('#cx-bep [data-out="fixed"]').textContent=fmtINR(F);
    document.querySelector('#cx-bep [data-out="price"]').textContent=fmtINR(P);
    document.querySelector('#cx-bep [data-out="vc"]').textContent=fmtINR(V);
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(fixed,fixedR);syncPair(price,priceR);syncPair(vc,vcR);
  compute();
})();
</script>
