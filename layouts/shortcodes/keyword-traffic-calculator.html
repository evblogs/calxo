<div class="cx-emi-widget" id="cx-ktp">
<style>
  #cx-ktp.cx-emi-widget {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.85rem;
    margin: 1.5rem 0 2.5rem; box-shadow: 0 4px 20px rgba(15,23,42,.04);
  }
  @media (max-width: 760px) { #cx-ktp.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; } }
  #cx-ktp label { display: block; margin-bottom: 1.15rem; }
  #cx-ktp label > span { display: flex; justify-content: space-between; align-items: baseline; font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem; }
  #cx-ktp label > span em { color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal; }
  #cx-ktp input[type="range"] { width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem; }
  #cx-ktp input[type="number"] { width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600; box-sizing: border-box; background: #fff; }
  #cx-ktp input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #cx-ktp .cx-ktp-toggle { display: flex; gap: .5rem; margin: .35rem 0 .25rem; }
  #cx-ktp .cx-ktp-toggle button { flex: 1; padding: .55rem .5rem; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; font-size: .9rem; font-weight: 600; color: #475569; cursor: pointer; transition: all .15s; }
  #cx-ktp .cx-ktp-toggle button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  #cx-ktp .cx-emi-result { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%); color: #fff; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  #cx-ktp .cx-emi-result::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; }
  #cx-ktp .cx-emi-result > * { position: relative; }
  #cx-ktp .cx-emi-result-label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85; }
  #cx-ktp .cx-emi-result-value { font-size: clamp(1.85rem,5vw,2.4rem); font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem; }
  #cx-ktp .cx-emi-row { display: flex; justify-content: space-between; padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem; }
  #cx-ktp .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-ktp .cx-emi-row strong { font-weight: 700; }
  #cx-ktp .cx-highlight { background: rgba(255,255,255,.13); border-radius: 8px; padding: .5rem .75rem; margin-top: .5rem; font-size: .82rem; line-height: 1.45; }
</style>
<div class="cx-emi-inputs">
  <label><span>Monthly search volume <em data-out="vol">10,000</em></span>
    <input type="number" id="cx-ktp-vol" min="0" max="100000000" step="100" value="10000" inputmode="numeric">
    <input type="range" id="cx-ktp-vol-r" min="0" max="200000" step="100" value="10000"></label>
  <label><span>Target ranking position <em data-out="pos">3</em></span>
    <input type="number" id="cx-ktp-pos" min="1" max="10" step="1" value="3" inputmode="numeric">
    <input type="range" id="cx-ktp-pos-r" min="1" max="10" step="1" value="3"></label>
  <label><span>Estimated CPC (₹) <em data-out="cpc">₹20</em></span>
    <input type="number" id="cx-ktp-cpc" min="0" max="10000" step="1" value="20" inputmode="numeric">
    <input type="range" id="cx-ktp-cpc-r" min="0" max="2000" step="1" value="20"></label>
  <label><span>Google AI Overview shown? <em data-out="aio">No</em></span>
    <div class="cx-ktp-toggle" id="cx-ktp-aio-toggle">
      <button type="button" data-aio="0" class="active">No</button>
      <button type="button" data-aio="1">Yes</button>
    </div>
  </label>
</div>
<div class="cx-emi-result">
  <div class="cx-emi-result-label">Estimated Monthly Clicks</div>
  <div class="cx-emi-result-value" id="cx-ktp-val">0</div>
  <div class="cx-emi-row"><span>Organic CTR at position <span id="cx-ktp-posn">3</span></span><strong id="cx-ktp-ctr">0%</strong></div>
  <div class="cx-emi-row"><span>Estimated yearly clicks</span><strong id="cx-ktp-year">0</strong></div>
  <div class="cx-emi-row"><span>Traffic value / month</span><strong id="cx-ktp-value">₹0</strong></div>
  <div class="cx-highlight" id="cx-ktp-note">—</div>
</div>
</div>
<script>
(function(){
  var CTR={1:0.276,2:0.158,3:0.110,4:0.084,5:0.063,6:0.049,7:0.039,8:0.033,9:0.027,10:0.024};
  // AI Overview CTR reduction by position (Ahrefs 2025 study, 300k keywords, GSC data)
  // #1 -58%, #2 -50.8%, #3 -46.4%, #5 -32.6%, #10 -19.4% (positions between are interpolated)
  var AIO_FACTOR={1:0.42,2:0.492,3:0.536,4:0.605,5:0.674,6:0.70,7:0.727,8:0.753,9:0.78,10:0.806};
  var fmtN=function(n){return Math.round(n).toLocaleString('en-IN');};
  var fmtINR=function(n){return '₹'+Math.round(n).toLocaleString('en-IN');};
  var vol=document.getElementById('cx-ktp-vol'),volR=document.getElementById('cx-ktp-vol-r');
  var pos=document.getElementById('cx-ktp-pos'),posR=document.getElementById('cx-ktp-pos-r');
  var cpc=document.getElementById('cx-ktp-cpc'),cpcR=document.getElementById('cx-ktp-cpc-r');
  var aio=0;
  function compute(){
    var V=parseFloat(vol.value)||0;
    var P=Math.min(10,Math.max(1,Math.round(parseFloat(pos.value)||1)));
    var C=parseFloat(cpc.value)||0;
    var ctr=CTR[P]*(aio?AIO_FACTOR[P]:1);
    var clicks=V*ctr;
    var value=clicks*C;
    var cut=Math.round((1-AIO_FACTOR[P])*100);
    document.getElementById('cx-ktp-val').textContent=fmtN(clicks);
    document.getElementById('cx-ktp-posn').textContent=P;
    document.getElementById('cx-ktp-ctr').textContent=(ctr*100).toFixed(1)+'%';
    document.getElementById('cx-ktp-year').textContent=fmtN(clicks*12);
    document.getElementById('cx-ktp-value').textContent=fmtINR(value);
    document.getElementById('cx-ktp-note').textContent=aio
      ?'AI Overview is showing, which cuts organic CTR about '+cut+'% at position #'+P+' (steeper near the top). Ranking #'+P+' on '+fmtN(V)+' searches gives about '+fmtN(clicks)+' clicks/month instead of '+fmtN(V*CTR[P])+'.'
      :'Ranking #'+P+' on '+fmtN(V)+' monthly searches gives about '+fmtN(clicks)+' clicks/month. Moving to #1 would give '+fmtN(V*CTR[1])+'.';
    document.querySelector('#cx-ktp [data-out="vol"]').textContent=fmtN(V);
    document.querySelector('#cx-ktp [data-out="pos"]').textContent=P;
    document.querySelector('#cx-ktp [data-out="cpc"]').textContent=fmtINR(C);
    document.querySelector('#cx-ktp [data-out="aio"]').textContent=aio?'Yes':'No';
  }
  function syncPair(n,r){n.addEventListener('input',function(){r.value=n.value;compute();});r.addEventListener('input',function(){n.value=r.value;compute();});}
  syncPair(vol,volR);syncPair(pos,posR);syncPair(cpc,cpcR);
  var tog=document.getElementById('cx-ktp-aio-toggle');
  tog.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click',function(){
      aio=parseInt(b.getAttribute('data-aio'),10);
      tog.querySelectorAll('button').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      compute();
    });
  });
  compute();
})();
</script>
