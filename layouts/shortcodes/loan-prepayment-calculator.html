<div class="cx-emi-widget" id="cx-prepay">
<style>
  #cx-prepay.cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-prepay.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-prepay label { display: block; margin-bottom: 1.15rem; }
  #cx-prepay label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-prepay label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-prepay input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-prepay input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-prepay input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-prepay .cx-emi-result {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff; border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cx-prepay .cx-emi-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-prepay .cx-emi-result > * { position: relative; }
  #cx-prepay .cx-emi-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-prepay .cx-emi-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem;
  }
  #cx-prepay .cx-emi-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem;
  }
  #cx-prepay .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-prepay .cx-emi-row strong { font-weight: 700; }
  #cx-prepay .cx-highlight {
    background: rgba(255,255,255,.15); border-radius: 8px;
    padding: .5rem .75rem; margin: .5rem 0;
    font-size: .85rem; font-weight: 700; text-align: center;
  }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Loan amount (₹) <em data-out="loan">₹30,00,000</em></span>
    <input type="number" id="cx-pp-loan" min="50000" max="100000000" step="50000" value="3000000" inputmode="numeric">
    <input type="range" id="cx-pp-loan-r" min="100000" max="10000000" step="50000" value="3000000">
  </label>
  <label>
    <span>Interest rate p.a. (%) <em data-out="rate">8.50%</em></span>
    <input type="number" id="cx-pp-rate" min="1" max="24" step="0.25" value="8.5" inputmode="decimal">
    <input type="range" id="cx-pp-rate-r" min="5" max="20" step="0.25" value="8.5">
  </label>
  <label>
    <span>Loan tenure (years) <em data-out="tenure">20 yrs</em></span>
    <input type="number" id="cx-pp-tenure" min="1" max="30" step="1" value="20" inputmode="numeric">
    <input type="range" id="cx-pp-tenure-r" min="1" max="30" step="1" value="20">
  </label>
  <label>
    <span>Prepayment amount (₹) <em data-out="prepay">₹2,00,000</em></span>
    <input type="number" id="cx-pp-prepay" min="1000" max="50000000" step="10000" value="200000" inputmode="numeric">
    <input type="range" id="cx-pp-prepay-r" min="10000" max="2000000" step="10000" value="200000">
  </label>
  <label>
    <span>Prepay after (months) <em data-out="after">24 months</em></span>
    <input type="number" id="cx-pp-after" min="1" max="360" step="1" value="24" inputmode="numeric">
    <input type="range" id="cx-pp-after-r" min="1" max="120" step="1" value="24">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Interest saved</div>
  <div class="cx-emi-result-value" id="cx-pp-saved">₹0</div>
  <div class="cx-emi-row"><span>Monthly EMI</span> <strong id="cx-pp-emi">₹0</strong></div>
  <div class="cx-emi-row"><span>Original tenure</span> <strong id="cx-pp-orig-tenure">0 months</strong></div>
  <div class="cx-emi-row"><span>New tenure</span> <strong id="cx-pp-new-tenure">0 months</strong></div>
  <div class="cx-emi-row"><span>Months saved</span> <strong id="cx-pp-months-saved">0</strong></div>
  <div class="cx-highlight" id="cx-pp-summary">—</div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtMo  = function (m) {
    var mo = Math.round(m);
    var y = Math.floor(mo / 12), rem = mo % 12;
    if (y === 0) return rem + ' mo';
    return y + ' yr' + (y > 1 ? 's' : '') + (rem > 0 ? ' ' + rem + ' mo' : '');
  };

  var loan    = document.getElementById('cx-pp-loan');
  var loanR   = document.getElementById('cx-pp-loan-r');
  var rate    = document.getElementById('cx-pp-rate');
  var rateR   = document.getElementById('cx-pp-rate-r');
  var tenure  = document.getElementById('cx-pp-tenure');
  var tenureR = document.getElementById('cx-pp-tenure-r');
  var prepay  = document.getElementById('cx-pp-prepay');
  var prepayR = document.getElementById('cx-pp-prepay-r');
  var after   = document.getElementById('cx-pp-after');
  var afterR  = document.getElementById('cx-pp-after-r');

  function compute() {
    var L  = parseFloat(loan.value) || 0;
    var r  = (parseFloat(rate.value) || 0) / 100 / 12;
    var n  = (parseInt(tenure.value) || 0) * 12;
    var PP = parseFloat(prepay.value) || 0;
    var k  = parseInt(after.value) || 0;

    if (L <= 0 || r <= 0 || n <= 0) return;

    var emi = L * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);

    // Outstanding principal after k payments
    var outstanding = L * Math.pow(1 + r, k) - emi * (Math.pow(1 + r, k) - 1) / r;
    outstanding = Math.max(0, outstanding);

    // After prepayment
    var newPrincipal = Math.max(0, outstanding - PP);

    // New remaining months (same EMI)
    var newRemaining = 0;
    if (newPrincipal > 0 && emi > newPrincipal * r) {
      newRemaining = Math.ceil(-Math.log(1 - newPrincipal * r / emi) / Math.log(1 + r));
    }

    var origInterest = emi * n - L;
    var newInterest  = emi * k + PP + emi * newRemaining - L;
    var saved        = origInterest - newInterest;
    var monthsSaved  = (n - k) - newRemaining;

    document.getElementById('cx-pp-emi').textContent          = fmtINR(emi);
    document.getElementById('cx-pp-orig-tenure').textContent  = fmtMo(n);
    document.getElementById('cx-pp-new-tenure').textContent   = fmtMo(k + newRemaining);
    document.getElementById('cx-pp-months-saved').textContent = Math.max(0, Math.round(monthsSaved)) + ' months';
    document.getElementById('cx-pp-saved').textContent        = fmtINR(Math.max(0, saved));
    document.getElementById('cx-pp-summary').textContent      =
      'Loan closes ' + fmtMo(Math.max(0, monthsSaved)) + ' early';

    document.querySelector('#cx-prepay [data-out="loan"]').textContent   = fmtINR(L);
    document.querySelector('#cx-prepay [data-out="rate"]').textContent   = (parseFloat(rate.value)||0).toFixed(2) + '%';
    document.querySelector('#cx-prepay [data-out="tenure"]').textContent = (parseInt(tenure.value)||0) + ' yrs';
    document.querySelector('#cx-prepay [data-out="prepay"]').textContent = fmtINR(PP);
    document.querySelector('#cx-prepay [data-out="after"]').textContent  = (parseInt(after.value)||0) + ' months';
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(loan, loanR);
  syncPair(rate, rateR);
  syncPair(tenure, tenureR);
  syncPair(prepay, prepayR);
  syncPair(after, afterR);
  compute();
})();
</script>
