  </ul>
</div>

  background: #f8f9fa;

  box-shadow: 0 0 12px rgba(0,0,0,0.05);
}

.related-links-box h2 {

  color: #586e8f;
}

.related-links-list {

  padding-left: 20px;
}

.related-links-list li::before {
  content: "🔗";
  position: absolute;
  left: 0;
  top: 0;
}

.related-links-list a {
  text-decoration: none;
  color: #212529;
  font-weight: 500;
  border-bottom: 1px dashed #586e8f;

.related-links-list a:hover {
