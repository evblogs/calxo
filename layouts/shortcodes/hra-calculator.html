<div class="cx-hra-widget" id="cx-hra">
<style>
  #cx-hra {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-hra { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-hra label { display: block; margin-bottom: 1.15rem; }
  #cx-hra label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-hra label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-hra input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-hra input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-hra input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-hra .cx-toggle {
    display: flex; background: #f1f5f9; border-radius: 8px; padding: 3px; margin-bottom: 1rem;
  }
  #cx-hra .cx-toggle button {
    flex: 1; padding: .55rem .8rem; border: 0; background: transparent;
    font-size: .85rem; font-weight: 600; color: #475569; border-radius: 6px;
    cursor: pointer; transition: all .15s ease;
  }
  #cx-hra .cx-toggle button.active {
    background: #fff; color: #2563eb; box-shadow: 0 1px 3px rgba(15, 23, 42, .08);
  }
  #cx-hra .cx-hra-result {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff; border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cx-hra .cx-hra-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-hra .cx-hra-result > * { position: relative; }
  #cx-hra .cx-hra-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-hra .cx-hra-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 .5rem;
  }
  #cx-hra .cx-sub {
    font-size: .82rem; opacity: .9; margin-bottom: 1rem;
  }
  #cx-hra .cx-hra-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255, 255, 255, .18); font-size: .87rem;
  }
  #cx-hra .cx-hra-row:last-of-type { border-bottom: none; }
  #cx-hra .cx-hra-row strong { font-weight: 700; }
  #cx-hra .cx-hra-row.cx-winner { background: rgba(255,255,255,.08); border-radius: 6px; padding: .55rem .65rem; margin: .35rem -.65rem 0; border-bottom: none; }
  #cx-hra .cx-hra-row.cx-total { padding-top: .75rem; font-size: .98rem; border-top: 2px solid rgba(255,255,255,.3); margin-top: .35rem; }
</style>

<div class="cx-hra-inputs">
  <div class="cx-toggle">
    <button type="button" class="active" data-city="metro">Metro city (50%)</button>
    <button type="button" data-city="non">Non-metro (40%)</button>
  </div>

  <label>
    <span>Basic salary + DA per month (₹) <em data-out="basic">50,000</em></span>
    <input type="number" id="cx-hra-basic" min="0" max="2000000" step="1000" value="50000" inputmode="numeric">
    <input type="range" id="cx-hra-basic-r" min="10000" max="500000" step="1000" value="50000">
  </label>

  <label>
    <span>HRA received per month (₹) <em data-out="hra">25,000</em></span>
    <input type="number" id="cx-hra-rec" min="0" max="2000000" step="500" value="25000" inputmode="numeric">
    <input type="range" id="cx-hra-rec-r" min="0" max="250000" step="500" value="25000">
  </label>

  <label>
    <span>Rent paid per month (₹) <em data-out="rent">22,000</em></span>
    <input type="number" id="cx-hra-rent" min="0" max="2000000" step="500" value="22000" inputmode="numeric">
    <input type="range" id="cx-hra-rent-r" min="0" max="200000" step="500" value="22000">
  </label>
</div>

<div class="cx-hra-result">
  <div class="cx-hra-result-label">Annual HRA exemption</div>
  <div class="cx-hra-result-value" id="cx-hra-exempt">₹2,04,000</div>
  <div class="cx-sub">Approx tax saved at 30% slab + cess: <strong id="cx-hra-saved">₹63,648</strong></div>
  <div class="cx-hra-row"><span>① Actual HRA received (annual)</span> <strong id="cx-hra-c1">₹3,00,000</strong></div>
  <div class="cx-hra-row"><span id="cx-hra-c2-label">② 50% of (Basic + DA)</span> <strong id="cx-hra-c2">₹3,00,000</strong></div>
  <div class="cx-hra-row cx-winner"><span>③ Rent − 10% of Basic (annual) ✓ lowest</span> <strong id="cx-hra-c3">₹2,04,000</strong></div>
  <div class="cx-hra-row"><span>HRA taxable</span> <strong id="cx-hra-tax">₹96,000</strong></div>
  <div class="cx-hra-row cx-total"><span>Annual exempt HRA</span> <strong id="cx-hra-exempt2">₹2,04,000</strong></div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };
  var fmtRaw = function (n) { return Math.round(n).toLocaleString('en-IN'); };

  var city = 'metro';
  var basic = document.getElementById('cx-hra-basic');
  var basicR = document.getElementById('cx-hra-basic-r');
  var rec = document.getElementById('cx-hra-rec');
  var recR = document.getElementById('cx-hra-rec-r');
  var rent = document.getElementById('cx-hra-rent');
  var rentR = document.getElementById('cx-hra-rent-r');
  var cityBtns = document.querySelectorAll('#cx-hra .cx-toggle button');

  function compute() {
    var B = parseFloat(basic.value) || 0;       // monthly basic + DA
    var H = parseFloat(rec.value) || 0;          // monthly HRA received
    var R = parseFloat(rent.value) || 0;         // monthly rent paid
    var pct = (city === 'metro') ? 0.5 : 0.4;

    var c1 = H * 12;
    var c2 = B * 12 * pct;
    var c3 = Math.max(0, (R - 0.1 * B) * 12);
    var exempt = Math.min(c1, c2, c3);
    var taxable = Math.max(0, c1 - exempt);
    var saved = exempt * 0.312; // 30% + 4% cess on tax (max slab); approximate

    document.getElementById('cx-hra-exempt').textContent = fmtINR(exempt);
    document.getElementById('cx-hra-exempt2').textContent = fmtINR(exempt);
    document.getElementById('cx-hra-saved').textContent = fmtINR(saved);
    document.getElementById('cx-hra-c1').textContent = fmtINR(c1);
    document.getElementById('cx-hra-c2').textContent = fmtINR(c2);
    document.getElementById('cx-hra-c3').textContent = fmtINR(c3);
    document.getElementById('cx-hra-tax').textContent = fmtINR(taxable);
    document.getElementById('cx-hra-c2-label').textContent = '② ' + (city === 'metro' ? '50%' : '40%') + ' of (Basic + DA)';

    // Highlight the lowest of the three components as the winner
    var rows = [
      { id: 'cx-hra-c1', val: c1, span: '① Actual HRA received (annual)' },
      { id: 'cx-hra-c2', val: c2, span: '② ' + (city === 'metro' ? '50%' : '40%') + ' of (Basic + DA)' },
      { id: 'cx-hra-c3', val: c3, span: '③ Rent − 10% of Basic (annual)' }
    ];
    var winner = rows.reduce(function (a, b) { return b.val < a.val ? b : a; });
    rows.forEach(function (r) {
      var el = document.getElementById(r.id).parentElement;
      el.classList.remove('cx-winner');
      el.querySelector('span').textContent = r.span;
    });
    var winEl = document.getElementById(winner.id).parentElement;
    winEl.classList.add('cx-winner');
    winEl.querySelector('span').textContent = winner.span + ' ✓ lowest';

    document.querySelector('#cx-hra [data-out="basic"]').textContent = fmtRaw(B);
    document.querySelector('#cx-hra [data-out="hra"]').textContent = fmtRaw(H);
    document.querySelector('#cx-hra [data-out="rent"]').textContent = fmtRaw(R);
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }
  syncPair(basic, basicR);
  syncPair(rec, recR);
  syncPair(rent, rentR);

  cityBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      cityBtns.forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      city = btn.getAttribute('data-city');
      compute();
    });
  });

  compute();
})();
</script>
