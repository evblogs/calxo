<div class="cx-emi-widget" id="cx-hle">
<style>
  #cx-hle.cx-emi-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    background: linear-gradient(150deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 1.85rem;
    margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15, 23, 42, .04);
  }
  @media (max-width: 760px) {
    #cx-hle.cx-emi-widget { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.25rem; }
  }
  #cx-hle label { display: block; margin-bottom: 1.15rem; }
  #cx-hle label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .88rem; font-weight: 600; color: #0f172a; margin-bottom: .4rem;
  }
  #cx-hle label > span em {
    color: #2563eb; font-weight: 700; font-size: .98rem; font-style: normal;
  }
  #cx-hle input[type="range"] {
    width: 100%; height: 6px; accent-color: #2563eb; margin: .35rem 0 .25rem;
  }
  #cx-hle input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-hle input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  #cx-hle .cx-emi-result {
    border-radius: 12px; padding: 1.5rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #06b6d4 100%);
    color: #fff;
  }
  #cx-hle .cx-emi-result::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none;
  }
  #cx-hle .cx-emi-result > * { position: relative; }
  #cx-hle .cx-emi-result-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .85;
  }
  #cx-hle .cx-emi-result-value {
    font-size: clamp(1.85rem, 5vw, 2.4rem); font-weight: 800;
    letter-spacing: -1px; line-height: 1.05; margin: .25rem 0 1.1rem;
  }
  #cx-hle .cx-emi-row {
    display: flex; justify-content: space-between;
    padding: .55rem 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: .9rem;
  }
  #cx-hle .cx-emi-row:last-of-type { border-bottom: none; }
  #cx-hle .cx-emi-row strong { font-weight: 700; }
  #cx-hle .cx-pill {
    display: inline-block; padding: .25rem .75rem; border-radius: 99px;
    font-size: .78rem; font-weight: 700; letter-spacing: .5px;
    margin-bottom: .85rem;
  }
  #cx-hle .cx-pill-green  { background: rgba(52,211,153,.25); color: #6ee7b7; }
  #cx-hle .cx-pill-yellow { background: rgba(251,191,36,.25); color: #fde68a; }
  #cx-hle .cx-pill-red    { background: rgba(248,113,113,.25); color: #fca5a5; }
</style>

<div class="cx-emi-inputs">
  <label>
    <span>Net monthly income (₹) <em data-out="income">75,000</em></span>
    <input type="number" id="cx-hle-income" min="10000" max="5000000" step="5000" value="75000" inputmode="numeric">
    <input type="range" id="cx-hle-income-r" min="15000" max="500000" step="5000" value="75000">
  </label>
  <label>
    <span>Existing EMIs / month (₹) <em data-out="emi">5,000</em></span>
    <input type="number" id="cx-hle-emi" min="0" max="500000" step="1000" value="5000" inputmode="numeric">
    <input type="range" id="cx-hle-emi-r" min="0" max="200000" step="1000" value="5000">
  </label>
  <label>
    <span>Home loan rate p.a. (%) <em data-out="rate">8.75%</em></span>
    <input type="number" id="cx-hle-rate" min="6" max="15" step="0.25" value="8.75" inputmode="decimal">
    <input type="range" id="cx-hle-rate-r" min="6" max="15" step="0.25" value="8.75">
  </label>
  <label>
    <span>Loan tenure (years) <em data-out="tenure">20 yrs</em></span>
    <input type="number" id="cx-hle-tenure" min="5" max="30" step="1" value="20" inputmode="numeric">
    <input type="range" id="cx-hle-tenure-r" min="5" max="30" step="1" value="20">
  </label>
</div>

<div class="cx-emi-result">
  <div class="cx-emi-result-label">Eligible Home Loan Amount</div>
  <div class="cx-emi-result-value" id="cx-hle-amount">—</div>
  <div id="cx-hle-pill" class="cx-pill cx-pill-green">Good eligibility</div>
  <div class="cx-emi-row"><span>Eligible EMI (50% FOIR)</span> <strong id="cx-hle-eligible-emi">—</strong></div>
  <div class="cx-emi-row"><span>FOIR after this loan</span> <strong id="cx-hle-foir">—</strong></div>
  <div class="cx-emi-row"><span>Monthly income required</span> <strong id="cx-hle-req-income">—</strong></div>
</div>
</div>

<script>
(function () {
  var fmtINR = function (n) { return '₹' + Math.round(n).toLocaleString('en-IN'); };

  var incEl    = document.getElementById('cx-hle-income');
  var incR     = document.getElementById('cx-hle-income-r');
  var emiEl    = document.getElementById('cx-hle-emi');
  var emiR     = document.getElementById('cx-hle-emi-r');
  var rateEl   = document.getElementById('cx-hle-rate');
  var rateR    = document.getElementById('cx-hle-rate-r');
  var tenEl    = document.getElementById('cx-hle-tenure');
  var tenR     = document.getElementById('cx-hle-tenure-r');

  function compute() {
    var income   = parseFloat(incEl.value)  || 0;
    var existing = parseFloat(emiEl.value)  || 0;
    var annRate  = parseFloat(rateEl.value) || 0;
    var years    = parseInt(tenEl.value)    || 0;

    /* Banks use 50% FOIR for salaried (some go up to 55-60% for high income) */
    var foirCap      = 0.50;
    var maxTotalEMI  = income * foirCap;
    var eligibleEMI  = Math.max(0, maxTotalEMI - existing);

    /* Loan amount = EMI × [(1-(1+r)^-n) / r] */
    var r = annRate / 12 / 100;
    var n = years * 12;
    var loanAmount = 0;
    if (eligibleEMI > 0 && r > 0 && n > 0) {
      loanAmount = eligibleEMI * ((1 - Math.pow(1 + r, -n)) / r);
    }

    var foirAfter = income > 0 ? ((existing + eligibleEMI) / income) * 100 : 0;

    /* Status pill */
    var pill = document.getElementById('cx-hle-pill');
    pill.className = 'cx-pill';
    if (eligibleEMI <= 0) {
      pill.textContent = 'No eligibility — reduce existing EMIs';
      pill.classList.add('cx-pill-red');
    } else if (foirAfter > 45) {
      pill.textContent = 'Tight — keep existing EMIs low';
      pill.classList.add('cx-pill-yellow');
    } else {
      pill.textContent = 'Good eligibility';
      pill.classList.add('cx-pill-green');
    }

    /* Minimum income needed for ₹50 L loan at same rate & tenure */
    var stdLoan = 5000000;
    var stdEMI  = r > 0 && n > 0 ? stdLoan * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1) : 0;
    var reqIncome = (stdEMI + existing) / foirCap;

    document.getElementById('cx-hle-amount').textContent        = fmtINR(loanAmount);
    document.getElementById('cx-hle-eligible-emi').textContent  = fmtINR(eligibleEMI);
    document.getElementById('cx-hle-foir').textContent          = foirAfter.toFixed(1) + '%';
    document.getElementById('cx-hle-req-income').textContent    = fmtINR(reqIncome) + ' (for ₹50 L loan)';

    document.querySelector('#cx-hle [data-out="income"]').textContent  = Math.round(income).toLocaleString('en-IN');
    document.querySelector('#cx-hle [data-out="emi"]').textContent     = Math.round(existing).toLocaleString('en-IN');
    document.querySelector('#cx-hle [data-out="rate"]').textContent    = annRate.toFixed(2) + '%';
    document.querySelector('#cx-hle [data-out="tenure"]').textContent  = years + ' yr' + (years !== 1 ? 's' : '');
  }

  function syncPair(numEl, rangeEl) {
    numEl.addEventListener('input', function () { rangeEl.value = numEl.value; compute(); });
    rangeEl.addEventListener('input', function () { numEl.value = rangeEl.value; compute(); });
  }

  syncPair(incEl, incR);
  syncPair(emiEl, emiR);
  syncPair(rateEl, rateR);
  syncPair(tenEl, tenR);
  compute();
})();
</script>
