<div class="cx-bmi-widget" id="cx-bmi">
<style>
  #cx-bmi {
    background: linear-gradient(150deg,#ffffff 0%,#f8fafc 100%);
    border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 1.85rem; margin: 1.5rem 0 2.5rem;
    box-shadow: 0 4px 20px rgba(15,23,42,.04);
  }
  #cx-bmi .cx-tabs {
    display: flex; background: #f1f5f9; border-radius: 10px;
    padding: 3px; gap: 3px; margin-bottom: 1.5rem;
  }
  #cx-bmi .cx-tabs button {
    flex: 1; padding: .55rem; border: 0; background: transparent;
    font-size: .85rem; font-weight: 600; color: #475569; border-radius: 7px;
    cursor: pointer; transition: all .15s;
  }
  #cx-bmi .cx-tabs button.active {
    background: #fff; color: #2563eb; box-shadow: 0 1px 3px rgba(15,23,42,.1);
  }
  #cx-bmi .cx-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;
  }
  @media (max-width: 600px) { #cx-bmi .cx-row { grid-template-columns: 1fr; } }
  #cx-bmi label > span {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: .85rem; font-weight: 600; color: #0f172a; margin-bottom: .35rem;
  }
  #cx-bmi label > span em { color: #2563eb; font-style: normal; font-weight: 700; }
  #cx-bmi input[type="range"] { width: 100%; accent-color: #2563eb; margin: .2rem 0; }
  #cx-bmi input[type="number"] {
    width: 100%; padding: .6rem .8rem; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: .98rem; color: #0f172a; font-weight: 600;
    box-sizing: border-box; background: #fff;
  }
  #cx-bmi input[type="number"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  #cx-bmi .cx-result {
    border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 1rem;
    color: #fff;
  }
  #cx-bmi .cx-result-label { font-size: .8rem; opacity: .8; font-weight: 500; }
  #cx-bmi .cx-result-value { font-size: 2.4rem; font-weight: 800; letter-spacing: -.02em; margin: .1rem 0; }
  #cx-bmi .cx-result-cat { font-size: 1.1rem; font-weight: 700; margin-bottom: .5rem; }
  #cx-bmi .cx-bmi-bar-wrap {
    background: rgba(255,255,255,.2); border-radius: 999px;
    height: 8px; margin: .75rem 0; position: relative; overflow: visible;
  }
  #cx-bmi .cx-bmi-bar {
    height: 100%; border-radius: 999px;
    background: rgba(255,255,255,.9); transition: width .3s ease;
  }
  #cx-bmi .cx-bmi-marker {
    position: absolute; top: -4px; width: 16px; height: 16px;
    background: #fff; border-radius: 50%; border: 3px solid currentColor;
    transform: translateX(-50%); transition: left .3s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  #cx-bmi .cx-grid3 {
    display: grid; grid-template-columns: repeat(3,1fr); gap: .6rem; margin-top: .85rem;
  }
  @media (max-width: 480px) { #cx-bmi .cx-grid3 { grid-template-columns: repeat(2,1fr); } }
  #cx-bmi .cx-mini {
    background: rgba(255,255,255,.15); border-radius: 8px;
    padding: .6rem .5rem; text-align: center;
  }
  #cx-bmi .cx-mini-val { font-size: 1rem; font-weight: 800; }
  #cx-bmi .cx-mini-lbl { font-size: .7rem; opacity: .8; margin-top: .1rem; }
  #cx-bmi .cx-result-sub { font-size: .8rem; opacity: .75; margin-top: .6rem; }
</style>

<div class="cx-tabs">
  <button class="active" onclick="cxBmiUnit('metric',this)">Metric (kg / cm)</button>
  <button onclick="cxBmiUnit('imperial',this)">Imperial (lbs / ft)</button>
</div>

<div id="cx-bmi-metric">
  <div class="cx-row">
    <label><span>Weight (kg) <em id="cx-bm-wv">70</em></span>
      <input type="range" id="cx-bm-ws" min="30" max="200" value="70" oninput="syncBmi('bm-w')">
      <input type="number" id="cx-bm-wn" value="70" min="30" max="200" oninput="syncBmi('bm-w',true)">
    </label>
    <label><span>Height (cm) <em id="cx-bm-hv">170</em></span>
      <input type="range" id="cx-bm-hs" min="100" max="220" value="170" oninput="syncBmi('bm-h')">
      <input type="number" id="cx-bm-hn" value="170" min="100" max="220" oninput="syncBmi('bm-h',true)">
    </label>
  </div>
</div>

<div id="cx-bmi-imperial" style="display:none">
  <div class="cx-row">
    <label><span>Weight (lbs) <em id="cx-bi-wv">154</em></span>
      <input type="range" id="cx-bi-ws" min="66" max="440" value="154" oninput="syncBmi('bi-w')">
      <input type="number" id="cx-bi-wn" value="154" min="66" max="440" oninput="syncBmi('bi-w',true)">
    </label>
    <div>
      <label style="margin-bottom:.5rem"><span>Feet <em id="cx-bi-fv">5</em></span>
        <input type="range" id="cx-bi-fs" min="3" max="7" value="5" step="1" oninput="syncBmi('bi-f')">
        <input type="number" id="cx-bi-fn" value="5" min="3" max="7" oninput="syncBmi('bi-f',true)">
      </label>
      <label><span>Inches <em id="cx-bi-iv">7</em></span>
        <input type="range" id="cx-bi-is" min="0" max="11" value="7" step="1" oninput="syncBmi('bi-i')">
        <input type="number" id="cx-bi-in" value="7" min="0" max="11" oninput="syncBmi('bi-i',true)">
      </label>
    </div>
  </div>
</div>

<div class="cx-result" id="cx-bmi-result" style="background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#06b6d4 100%)">
  <div class="cx-result-label">Your BMI</div>
  <div class="cx-result-value" id="cx-bmi-val">—</div>
  <div class="cx-result-cat" id="cx-bmi-cat">—</div>
  <div class="cx-bmi-bar-wrap">
    <div class="cx-bmi-bar" id="cx-bmi-bar" style="width:0%"></div>
    <div class="cx-bmi-marker" id="cx-bmi-marker" style="left:0%"></div>
  </div>
  <div class="cx-grid3">
    <div class="cx-mini"><div class="cx-mini-val" id="cx-bmi-ideal">—</div><div class="cx-mini-lbl">Ideal Weight (kg)</div></div>
    <div class="cx-mini"><div class="cx-mini-val" id="cx-bmi-diff">—</div><div class="cx-mini-lbl">From Normal Range</div></div>
    <div class="cx-mini"><div class="cx-mini-val" id="cx-bmi-cat2">—</div><div class="cx-mini-lbl">Asian BMI Category</div></div>
  </div>
  <div class="cx-result-sub" id="cx-bmi-sub"></div>
</div>

<script>
var cxBmiMode='metric';
function cxBmiUnit(mode,btn){
  cxBmiMode=mode;
  document.getElementById('cx-bmi-metric').style.display=mode==='metric'?'':'none';
  document.getElementById('cx-bmi-imperial').style.display=mode==='imperial'?'':'none';
  document.querySelectorAll('#cx-bmi .cx-tabs button').forEach((b,j)=>b.classList.toggle('active',b===btn));
  cxBmiCalc();
}
function syncBmi(id,fromNum){
  var s=document.getElementById('cx-'+id+'s');
  var n=document.getElementById('cx-'+id+'n');
  var v=document.getElementById('cx-'+id+'v');
  if(fromNum){s.value=n.value;}else{n.value=s.value;}
  if(v)v.textContent=s.value;
  cxBmiCalc();
}
function cxBmiCalc(){
  var kg,cm;
  if(cxBmiMode==='metric'){
    kg=parseFloat(document.getElementById('cx-bm-wn').value)||0;
    cm=parseFloat(document.getElementById('cx-bm-hn').value)||0;
  } else {
    var lbs=parseFloat(document.getElementById('cx-bi-wn').value)||0;
    var ft=parseFloat(document.getElementById('cx-bi-fn').value)||0;
    var inch=parseFloat(document.getElementById('cx-bi-in').value)||0;
    kg=lbs*0.453592; cm=(ft*12+inch)*2.54;
  }
  if(!kg||!cm)return;
  var h=cm/100;
  var bmi=kg/(h*h);
  document.getElementById('cx-bmi-val').textContent=bmi.toFixed(1);

  // WHO categories
  var cat,color;
  if(bmi<18.5){cat='Underweight';color='linear-gradient(135deg,#1d4ed8,#3b82f6)';}
  else if(bmi<25){cat='Normal Weight';color='linear-gradient(135deg,#065f46,#10b981)';}
  else if(bmi<30){cat='Overweight';color='linear-gradient(135deg,#92400e,#f59e0b)';}
  else{cat='Obese';color='linear-gradient(135deg,#7f1d1d,#ef4444)';}
  document.getElementById('cx-bmi-cat').textContent=cat;
  document.getElementById('cx-bmi-result').style.background=color;

  // Asian category (lower thresholds)
  var asianCat;
  if(bmi<18.5)asianCat='Underweight';
  else if(bmi<23)asianCat='Normal';
  else if(bmi<27.5)asianCat='Overweight';
  else asianCat='Obese';
  document.getElementById('cx-bmi-cat2').textContent=asianCat;

  // Bar — scale 15 to 40
  var pct=Math.min(100,Math.max(0,(bmi-15)/25*100));
  document.getElementById('cx-bmi-bar').style.width=pct+'%';
  document.getElementById('cx-bmi-marker').style.left=pct+'%';

  // Ideal weight (BMI 18.5–24.9)
  var lo=(18.5*h*h).toFixed(1), hi=(24.9*h*h).toFixed(1);
  document.getElementById('cx-bmi-ideal').textContent=lo+'–'+hi;

  // Diff from normal
  var diff;
  if(bmi<18.5){diff='+'+(18.5*h*h-kg).toFixed(1)+' kg to gain';}
  else if(bmi>25){diff='-'+(kg-25*h*h).toFixed(1)+' kg to lose';}
  else{diff='In range ✓';}
  document.getElementById('cx-bmi-diff').textContent=diff;

  document.getElementById('cx-bmi-sub').textContent='Weight: '+kg.toFixed(1)+'kg · Height: '+cm.toFixed(0)+'cm · BMI '+bmi.toFixed(2);
}
// init
['bm-w','bm-h'].forEach(id=>{
  var v=document.getElementById('cx-'+id+'v');
  if(v)v.textContent=document.getElementById('cx-'+id+'n').value;
});
cxBmiCalc();
</script>
</div>
